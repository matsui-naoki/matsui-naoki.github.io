## 研究概要: 蓄電デバイスの高性能化に向けて

### 社会的背景と重要性

カーボンニュートラル社会の実現に向けて、**高性能蓄電デバイス**の開発は喫緊の課題となっています。再生可能エネルギーの効率的な利用、電気自動車の普及拡大、IoTデバイスの長時間駆動など、私たちの生活のあらゆる場面で革新的な蓄電技術が求められています。

### 全固体電池: 次世代蓄電技術の本命

従来のリチウムイオン電池が抱える**安全性**と**エネルギー密度**の限界を突破する技術として、**全固体電池**が世界的に注目を集めています。

#### 全固体電池の特徴
- **高い安全性**: 可燃性の有機電解液を使用しないため、発火リスクが大幅に低減
- **高エネルギー密度**: 固体電解質により、より高電圧での動作が可能
- **広い動作温度範囲**: -40℃から100℃以上での安定動作
- **長寿命**: 界面での副反応が抑制され、サイクル特性が向上

### グローバルな開発競争

現在、日本、韓国、中国、欧米の企業・研究機関が熾烈な開発競争を繰り広げています。特に自動車産業では、2030年代の実用化を目指して数兆円規模の投資が行われており、**材料開発のブレークスルー**が勝敗を左右する状況です。

### 材料革新がもたらすイノベーション

蓄電デバイスの性能は、その構成材料の特性に大きく依存します。私たちの研究室では、以下の観点から新規材料の開発に取り組んでいます：

1. **高イオン伝導性固体電解質の開発**
   - 室温で10⁻³ S/cm以上のイオン伝導率を実現
   - 化学的・電気化学的安定性の両立

2. **界面制御技術の確立**
   - 電極/電解質界面での抵抗低減
   - 界面反応メカニズムの解明

3. **新規電極材料の探索**
   - 高容量・高出力を実現する材料設計
   - 資源制約の少ない元素の活用

### 研究アプローチ: 機能性向上とメカニズム探求

私たちは、**材料科学**、**電気化学**、**計算科学**を融合したアプローチで、日々研究に取り組んでいます。単なる性能向上だけでなく、なぜその性能が発現するのかという**基礎的なメカニズムの解明**を重視し、真に革新的な材料開発を目指しています。

## 研究トピック1: フッ化物イオン伝導体の探索

### 概要

フッ化物イオン伝導体は、リチウムイオンに比べて高い理論エネルギー密度を持つ次世代蓄電デバイスの実現に向けて注目されています。本研究では、新規フッ化物イオン伝導体の探索と、その伝導メカニズムの解明に取り組んでいます。

### 研究内容

- **新規結晶構造の探索**: Scheelite型、Tysonite型など様々な結晶構造におけるフッ化物イオン伝導性の評価
- **欠陥制御による高イオン伝導化**: アニオン過剰組成の設計による伝導パスの最適化
- **界面制御技術**: 電極/電解質界面でのフッ化物イオン移動の促進

### 主な成果

- 新規Scheelite型フッ化物イオン伝導体の発見
- 多面体連結性の動的変化（頂点共有↔稜共有）による高イオン伝導機構の解明
- 室温で10⁻⁴ S/cmを超える高いフッ化物イオン伝導率の実現

---

## 研究トピック2: リチウムイオン伝導体の探索

### 概要

全固体リチウムイオン電池の実用化に向けて、高いイオン伝導性と化学的安定性を両立する新規固体電解質の開発が急務です。本研究では、材料インフォマティクスと実験を融合したアプローチで効率的な材料探索を行っています。

### アプローチ

1. **機械学習による材料スクリーニング**: 配位多面体モチーフを特徴量としたイオン伝導率予測
2. **ニューラルネットワークポテンシャル（NNP）**: 高速分子動力学計算によるイオン伝導率の理論予測
3. **実験的検証**: ハイスループット合成による迅速な材料合成と評価

### 成果と展望

- JACSに掲載された新規リチウムイオン伝導体の発見
- 硫化物系、酸化物系、ハロゲン化物系など多様な材料系での探索
- 産業応用を見据えた大気安定性の向上

---

## 研究トピック3: ヒドリド伝導性材料・デバイスの探索

### 概要

水素の陰イオンであるヒドリドイオン（H⁻）を電荷担体とする新しいエネルギーデバイスの開発に取り組んでいます。ヒドリドイオン伝導体は、高い還元力を活かした新規電池系の構築が期待されています。

### 研究内容

- **ペロブスカイト型ヒドリド伝導体**: BaH₂をベースとした新規組成の開発
- **錯イオン導入による高伝導化**: BH₄⁻などの錯イオンドーピングによる伝導性向上
- **電極材料の開発**: ヒドリドイオンの挿入脱離が可能な新規電極材料

### 国際共同研究

- St. Andrews大学（英国）との材料開発
- GIST（韓国）との共同研究によるJACS論文の発表
- 欧州の研究機関との連携強化

---

## 研究トピック4: ハイスループット合成実験系の構築と新材料探索への適用

### 概要

材料開発の効率を飛躍的に向上させるため、自動合成・評価システムの構築に取り組んでいます。これにより、従来の10倍以上の速度で新材料のスクリーニングが可能になります。

### システム構成

1. **自動秤量・混合システム**: ロボットアームによる原料の精密秤量
2. **並列合成炉**: 最大48サンプルの同時合成
3. **自動評価装置**: XRD、インピーダンス測定の自動化
4. **データ管理システム**: 実験条件と結果の統合データベース

### 活用例

- 組成傾斜法による最適組成の迅速探索
- 合成条件（温度、時間、雰囲気）の系統的最適化
- 機械学習との連携による次の実験条件の提案

---

## 研究トピック5: 汎用的ニューラルネットワークポテンシャルを活用した材料探索

### 概要

第一原理計算の精度を保ちながら、計算速度を大幅に向上させるニューラルネットワークポテンシャル（NNP）を活用し、新規イオン伝導体の理論的探索を行っています。

### 手法と特徴

## 菅野・鈴木研究室について

菅野・鈴木研では新入生を募集しています。私自身は助教の立場ですので、指導教員になることは当然できませんが、**東京科学大学 物質理工学院 応用化学系 菅野・鈴木研の鈴木耕太准教授**を指導教員として選んでいただくことになります。

基本的には横の隔たりなく、常に気軽に相談できる環境を心がけています。日々の研究活動において、教員・学生間の垣根を低くし、自由闊達な議論ができる研究室を目指しています。

## 研究室の特色

### 研究センターとしての側面

同時に研究センターとしての側面もあります。その観点から、菅野・鈴木研では様々な共同研究・国プロジェクトに携わる機会があると思います。これらの経験を通じて、**多角的な視野・ネットワーク**を養うことを期待します。

### 多様性のある研究環境

様々なバックグラウンドの方々が一同に集まって日々研究に取り組んでいます：
- 化学系出身者
- 物理系出身者
- 材料系出身者
- 情報系出身者

この多様性が、新しいアイデアの創出と学際的な研究の推進力となっています。

## 教育方針

### 学会発表・論文投稿

早くに学会発表、場合によっては国際誌に論文を投稿ができるよう丁寧に指導します。

**段階的な成長プロセス**：
1. まずは若手の会でのポスター発表を通じて、他者に解りやすく説明するスキルを身につけてもらいます
2. 国内学会での口頭発表にチャレンジ
3. 国際学会での発表
4. 査読付き論文の執筆・投稿

### 最先端技術の活用

機械学習などのコモディティ化した手法＋**オリジナリティを生み出すための着眼点**を養います。

**利用可能な計算資源**：
- 東京科学大学の**TSUBAME**スーパーコンピュータ
- Preferred Networks の計算クラウド環境 **Matlantis**
- 研究室独自の計算サーバー

最先端の手法を常にキャッチアップして（最近はやや追いつけていないですが・・・）、効率的に材料を開発する手法を模索しています。

## 研究室見学について

研究室見学はいつでも歓迎します。ご希望の場合は、事前にメールで日程候補をご連絡ください。

**見学の流れ**（約2時間）：
1. 研究室のM1-2学生との面談（30分）
2. ラボツアー（実験設備の見学）（30分）
3. 教員とのディスカッション（60分）

## よくあるQ&A

### Q: 分野が違うが、問題ない？
**A**: ガッツがあれば問題ない。実際、異分野からの学生が新しい視点をもたらし、革新的な研究成果につながることが多いです。必要な知識は入学後に習得できるようサポートします。

### Q: コアタイムは？
**A**: コアタイムは特段設けていませんが、おおよそ**10時-18時**を目安としています。研究の進捗や実験の都合に応じて、フレキシブルに対応しています。

### Q: 研究テーマの選び方は？
**A**: 複数の候補をこちらで準備して、学生の希望とすりあわせて決定します。学生の興味・適性・将来のキャリアプランを考慮して、最適なテーマを一緒に見つけていきます。

### Q: 機械学習を利用した研究テーマに取り組むことは可能か？
**A**: 機械学習だけではNGです。コモディティ化しているので、もう一つ二つ軸を加えてオリジナルな研究を行います。例えば：
- 機械学習 × 材料合成 × 結晶構造解析
- 機械学習 × イオン伝導 × デバイス応用

### Q: 就職活動のサポートは？
**A**: OB/OGのネットワークを活用したサポートを行っています。企業との共同研究も多く、産業界とのつながりも強いです。

### Q: 博士課程への進学は？
**A**: 意欲のある学生の博士課程進学を積極的に支援します。日本学術振興会特別研究員（DC1/DC2）の申請サポートも行います。

## メッセージ

新しい材料の発見は、社会を大きく変える可能性を秘めています。特に、エネルギー問題の解決に向けた蓄電デバイスの開発は、人類の持続可能な発展に不可欠です。

私たちと一緒に、材料科学の最前線で研究に取り組んでみませんか？熱意ある学生の参加をお待ちしています。

### 概要
深層学習は、多層のニューラルネットワークを用いて複雑なパターンを学習する機械学習の一分野です。画像認識、自然言語処理、音声認識など幅広い分野で革新的な成果を上げています。

### 基本アーキテクチャ
- **全結合層（FC）**: 最も基本的な層
- **畳み込みニューラルネットワーク（CNN）**: 画像処理に特化
- **再帰型ニューラルネットワーク（RNN）**: 系列データ処理
- **Transformer**: 注意機構を用いた最新アーキテクチャ

### 重要な概念
1. **逆伝播法**: 勾配計算の効率的なアルゴリズム
2. **活性化関数**: ReLU、Sigmoid、Tanh
3. **正則化**: Dropout、L1/L2正則化
4. **最適化**: SGD、Adam、RMSprop

### 実装フレームワーク

### 概要
交流インピーダンス法（AC impedance method）または電気化学インピーダンス分光法（EIS）は、材料の電気的性質を周波数領域で評価する強力な手法です。固体電解質のイオン伝導率測定において標準的な評価法となっています。

### 測定原理
- **交流信号の印加**: 小振幅の正弦波電圧を印加
- **応答電流の測定**: 振幅と位相差を検出
- **インピーダンスの算出**: Z = V/I（複素数）
- **周波数掃引**: 通常10⁻² Hz ～ 10⁷ Hzの範囲

### データ解析

#### 1. Nyquistプロット
- 横軸: 実部（Z'）、縦軸: 虚部（-Z''）
- 半円弧: RC並列回路に対応
- 直線部: Warburg拡散

#### 2. Bodeプロット
- 周波数に対する|Z|と位相角のプロット
- 時定数の分離が容易

#### 3. 等価回路解析
- **バルク抵抗（Rb）**: 高周波側の半円弧
- **粒界抵抗（Rgb）**: 中周波側の半円弧
- **電極界面抵抗（Rct）**: 低周波側の応答
- **定相要素（CPE）**: 理想的でないキャパシタンス

### 固体電解質への応用

#### イオン伝導率の決定
σ = L / (R × A)
- L: 試料厚さ
- R: 抵抗値
- A: 電極面積

#### 活性化エネルギーの算出
- Arrhenius プロット: ln(σT) vs 1/T
- 傾きから活性化エネルギー（Ea）を決定

### 測定時の注意点
1. **電極の選択**: ブロッキング電極（Au, Pt）vs 可逆電極（Li, Na）
2. **試料調製**: 緻密な焼結体、平行な電極面
