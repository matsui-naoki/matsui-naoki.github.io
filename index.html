## 研究概要: 蓄電デバイスの高性能化に向けて

### 次世代蓄電技術
<div class="large-photo-container">
<div class="large-photo-content">

持続可能な社会の実現に向けて、**高性能蓄電デバイス**の開発は喫緊の課題となっています。再生可能エネルギーの効率的な利用、電気自動車の普及拡大、IoTデバイスの長時間駆動など、私たちの生活のあらゆる場面で革新的な蓄電技術が求められています。
従来のリチウムイオン電池が抱える**安全性**と**エネルギー密度**の限界を突破する技術として、**全固体電池**が世界的に注目を集めています。
#### 全固体電池の特徴
- **高い安全性**: 可燃性の有機電解液を使用しないため、発火リスクが低減。広い動作温度範囲にも特徴
- **高速充放電**: 超イオン導電体の固体電解質により、高速に充放電が可能
- **高エネルギー密度**: 高電圧作動電極の利用・電極合剤構造の最適化
</div>

### 材料革新がもたらすイノベーション

蓄電デバイスの性能は、その構成材料（固体電解質・電極）の特性に大きく依存します。リチウム(Li<sup>+</sup>)電池の他にも、フッ化物(F<sup>–</sup>)電池やヒドリド(H<sup>-</sup>)デバイスの開発にも取り組んでいます。以下の観点から新規材料の開発に取り組んでいます：

<div class="elements-container">
<div class="elements-content">

1. **高イオン伝導性固体電解質の開発**
   - 固体中を高速でイオンが伝導する固体電解質（Li<sup>+</sup>, F<sup>–</sup>, H<sup>–</sup>)
   - イオン伝導率・化学的/電気化学的安定性に優れた材料の探索 (F<sup>–</sup>)
   - 資源制約の少ない元素の活用 (F<sup>–</sup>, F<sup>–</sup>)
2. **新規電極材料の探索**
   - 新たな反応系の電極材料の探索 (F<sup>–</sup>, H<sup>–</sup>)

さらに、単なる性能向上だけでなく、なぜその性能が発現するのかという**基礎的なメカニズムの解明**にも重視し、革新的な材料開発を目指しています。

## 研究トピック1: フッ化物イオン伝導体の探索

### 概要

フッ化物電池 (Fluroide-ion battery) は、リチウム電池に比べて高い理論エネルギー密度を持つ次世代蓄電デバイスとして注目されています。フッ化物電池の実現に必要不可欠なのが、フッ化物イオンが固体中を高速に伝導可能な固体電解質材料の開発です。
本研究では、新規フッ化物イオン伝導体の探索と、その伝導メカニズムの解明に取り組んでいます。特に、電気化学的安定性とイオン伝導性を両立した固体電解質の開発や、極めて高いイオン伝導率を示す孤立電子対系のフッ化物イオン伝導体の開発に取り組んでいます。

<div class="photo-container">

## 菅野・鈴木研究室について

菅野・鈴木研では新入生を募集しています。私自身は助教の立場ですので、指導教員になることは当然できませんが、**東京科学大学 物質理工学院 応用化学系 菅野・鈴木研の鈴木耕太准教授**を指導教員として選んでいただくことで菅野鈴木研として一緒に研究活動を行えます。
基本的には横・上下の隔たりなく、常に気軽に相談できる環境を心がけています。日々の研究活動において、教員・学生間の垣根を低くし、自由闊達な議論ができる研究室を目指しています。

## 研究室の特色
### 菅野・鈴木研としての特色
固体化学をベースに新規な固体電解質・電極の開発と、デバイス性能向上に向けたメカニズム解明に取り組んでいます。特に固体電解質の開発に注力して、より優れた特性を有する新材料の開発に取り組んでいます。
新たな固体電解質の開発は、時に一筋縄ではいかない難しい挑戦です。最先端の機械学習やシミュレーション、多様な合成技術を駆使して、効果的な材料探索を展開します。研究室での活動を通じて、皆さんに自身が開発した材料を最低1個、追求してもらいます。世の中の誰もが知らない新しい材料を創成する、わくわくする研究です。

### 研究センターとしての側面
同時に全固体電池研究センターとしての側面もあります。全固体電池研究センターには多数の教員・職員が在籍しており、日々研究に専念しています。その観点で、菅野・鈴木研では様々な共同研究・国プロジェクトに携わる機会があると思います。これらの経験を通じて、**多角的な視野・ネットワーク**を養うことを期待します。

### 多様性のある研究環境

- 化学系出身者
- 材料系出身者
- 生物系出身者（私がまさにそう）

## よくあるQ&A

### Q: 分野が違うが、問題ない？
**A**: 熱意があれば問題ないです。異なるバックグラウンドの学生が多く活躍しています。必要な知識は入学後に習得できるようサポートします。2025年度は定期勉強会を開催して、固体イオニクスの基礎知識の習得を図りました。

### Q: 研究テーマの選び方は？
**A**: 複数の候補をこちらで準備して、学生の希望とすりあわせて決定します。学生の興味・適性を考慮して、最適なテーマを一緒に見つけていきます。

### Q: コアタイムは？
**A**: コアタイムは特段設けていませんが、おおよそ**10時-18時**を目安としています。研究の進捗や実験の都合に応じて、フレキシブルに対応しています。

### Q: 機械学習を利用した研究テーマに取り組むことは可能か？
**A**: 機械学習だけではNGです。もう一つ二つ軸を加えてオリジナルな研究を行います。例えば：
- 機械学習 × 予測に基づく材料探索
- 新たなコンセプト(切り口) × 機械学習 × イオン伝導

### Q: 就職活動は？
**A**: このあたりは実際に研究室に足を運んでM1,2学生に聞いてみてください。企業との共同研究も多く、産業界とのつながりも強いです。

### Q: 博士課程への進学は？
**A**: 意欲のある学生の博士課程進学を積極的に支援します。日本学術振興会特別研究員（DC1/DC2）の申請サポートも行います。

## 電池性能の評価指標(工事中)

---
### 1. 基本的な電池性能指標

#### 電池電圧 (Voltage, E)
電池端子間の電位差を表し、電池の起電力を示す基本的な指標である。
- **開回路電圧（OCV）**: 電流が流れていない状態での電圧
- **動作電圧**: 実際に電流が流れている時の電圧
- 動作時は内部抵抗により電圧降下が生じる：**ΔV = IR**

#### 容量 (Capacity, Q) **Q [C] = I [A] × t [h]**: 電池から取り出せる電気量を表す。
- 例：3 mAの電流で2時間放電した場合、Q = 6 mAh

#### 出力 (Power, P) **P [W] = E [V] × I [A]**: 単位時間あたりに取り出せるエネルギーを表す。
- 単位：W（ワット）= J/s（ジュール毎秒）= J s<sup>-1</sup>
- 高出力が必要な用途で重要
---
### 2. 電極の理論容量の計算
**理論容量 [mAh/g] = (n × F) / (M × 3.6)**

- n：反応電子数
- F：ファラデー定数（96,485 C/mol）
- M：活物質の分子量（g/mol）
- 3.6：単位変換係数（C → mAh）

#### 計算例：Li<sub>4</sub>Ti<sub>5</sub>O<sub>12</sub>の場合

反応式：Li<sub>4</sub>Ti<sub>5</sub>O<sub>12</sub> + 3Li<sup>+</sup> + 3e<sup>-</sup> ⇄ Li<sub>7</sub>Ti<sub>5</sub>O<sub>12</sub>
- 反応電子数（n）= 3
- 分子量（M）= 459.1 g/mol
- 理論容量 = (3 × 96,485) / (459.1 × 3.6) = **175 mAh/g**

#### Cレート

充放電速度を表す指標で、理論容量に対する電流値の比
- 1C：1時間で理論容量分を充放電する電流
- 0.1C：10時間で理論容量分を充放電する電流
- 例：500 mAhの電池を50 mAで放電 → 0.1C

### 3. 起電力の計算
電池反応のギブスエネルギー変化から起電力を計算できる：
**ΔG = -nFE**
- ΔG：ギブスエネルギー変化
- n：反応電子数
- F：ファラデー定数
- E：起電力

#### 計算例：銀電池
反応式：Zn + Ag<sub>2</sub>O = ZnO + 2Ag
- ΔG = -309 kJ/mol（MALT2データベースより）
- n = 2
- E = -ΔG/(nF) = 309,000/(2×96,485) = **1.60 V**

#### 化学ポテンシャルによる理解
起電力は化学ポテンシャルの差として表現することもできる：
**E = -[(μ<sub>ZnO</sub> + 2μ<sub>Ag</sub>) - (μ<sub>Zn</sub> + μ<sub>Ag<sub>2</sub>O</sub>)]/(2F)**

ここで、ZnOおよびAg<sub>2</sub>O中の酸素の化学ポテンシャルは：
- μ<sub>O,ZnO</sub> = μ<sub>ZnO</sub> - μ<sub>Zn</sub>
- μ<sub>O,Ag<sub>2</sub>O</sub> = μ<sub>Ag<sub>2</sub>O</sub> - 2μ<sub>Ag</sub>

したがって：
**E = -(μ<sub>O,ZnO</sub> - μ<sub>O,Ag<sub>2</sub>O</sub>)/(2F)**

つまり、**起電力はZnOとAg<sub>2</sub>O中の酸素の化学ポテンシャル差**として理解できる。

# イオン伝導体の基礎と設計指針：詳細解説 (工事中)

## 1. イオン伝導体の基本概念

### 1.1 イオン伝導体とは

有限温度でイオンが平衡位置を基点に熱振動 + イオン伝導体は平衡位置から移動可能

**絶縁体の場合：**
- イオンは有限温度で平衡位置を基点に熱振動

**イオン伝導体の場合：**
- イオンが平衡位置から移動できる
- ただし、イオンが動くためには欠陥が必要

### 1.2 基本的な電気伝導の式

イオン伝導率は以下の基本式で表される：

**σ = zecμ**

ここで：
- σ：イオン伝導率 [S cm<sup>-1</sup>]
- z：電荷数
- e：電気素量
- c：欠陥（キャリア）濃度
- μ：移動度（mobility）

アインシュタイン関係式：

**μ = zeD/kT**

**σ = (ze)²cD/kT**

拡散係数の温度依存性：

**D = D₀ × exp(-E_mig/kT)**

最終的なアレニウス則：

**σ = σ₀/T × exp(-E_a/kT)**

## 2. 欠陥の種類と特性

### 2.1 内因性欠陥（Intrinsic Defect）

内因性欠陥は「有限温度で生じる、自身で完結する（系外物質とやりとりの無い）反応」

#### 2.1.1 Frenkel欠陥の詳細メカニズム

基本反応：
1. ①イオンが格子間位置に移動して、空孔を生成
2. ②隣接イオンが空孔位置に移動
3. ③格子間イオンが隣の格子間位置へ移動

②または③（もしくは両方）によりイオンが移動する。

**注記：**アニオンのFrenkel欠陥をAnti-Frenkel欠陥とも呼ぶ。

#### 2.1.2 Schottky欠陥の詳細メカニズム

基本反応：
1. ①正負のイオン対の空孔生成
2. ②隣接イオンが空孔位置に移動

### 2.2 内因性欠陥を利用したイオン伝導の詳細

#### 2.2.1 活性化エネルギーの内訳

イオン伝導に要するエネルギー（活性化エネルギー）の詳細：

**E_a = (1/2)E_f + E_mig**

ここで：
- E_f：欠陥形成エネルギー（defect formation energy）
- E_mig：移動エネルギー（migration energy）
- *E_fの係数は欠陥様式により異なる（はず）

- 平衡位置と隣接平衡位置間にE_migの障壁
- 欠陥形成にE_fのエネルギーが必要

#### 2.2.2 欠陥濃度の詳細計算

欠陥濃度の関係式：

**C_i × C_v = N × exp(-E_f/kT)**

**C_i = C_v** （電気的中性条件）

したがって：

**C_v = √N × exp(-E_f/2kT)**

イオン伝導率の導出：

**σ = zecμ**

**μ = zeD/kT** （Einstein方程式）

**σ = (ze)²cD/kT**

拡散係数：

**D = D₀ × exp(-E_mig/kT)**

最終的に：

**σ = (ze)²C_vD₀/kT × exp(-(E_f/2 + E_mig)/kT)**

**σ = σ₀/T × exp(-E_a/kT)** （アレニウス則）

- 傾き：E_mig + E_f/2

**低温領域：**外因性欠陥濃度が優勢
- c ≈ const.（温度依存なし）
- σ ≈ exp(-E_mig/kT)
- 傾き：E_mig

**重要な注記：**完全結晶は実在せず、微量の外因性欠陥が大抵含まれるので、低温側では制御しきれない微量な外因性欠陥（濃度一定）にキャリア濃度・イオン伝導率が支配される。

遷移確率の計算：
- 安定位置から遷移状態のエネルギー差E_mig
- 遷移状態にある確率：exp(-E_mig/kT)

1秒あたりに原子が遷移する頻度：

**ν = ν₀ exp(-E_mig/kT)**

拡散係数の最終式：

**D = ad²ν = D₀ exp(-E_mig/kT)**

*aは係数（隣接サイト数等）

**重要な注記：**原子の存在確率密度分布 ρ(x,y,z) / atom Å<sup>-3</sup>が解れば、相対エネルギーE_migが求まる。

## 6. Kinetic Monte Carlo（KMC）手法の詳細

### 6.1 基本概念と定義

**モンテカルロ：**ランダムサンプリングのこと

モンテカルロが含まれる手法は色々ある
- 逆モンテカルロ：ランダムサンプリングにより実測値を再現するモデルを探索
- レプリカ交換モンテカルロ

### 6.2 詳細な計算手順

#### 6.2.1 各移動先への遷移確率

4つの隣接サイトE₁, E₂, E₃, E₄がある場合：

**E₁を乗り越える確率：P₁ = exp(-E₁/kT)**

**E_iを乗り越え進む確率：P_i = exp(-E_i/kT) / Σᵢ exp(-E_i/kT)**

#### 6.2.2 シミュレーション詳細

単位時間あたりのホッピング頻度（近似）：
- Debye Freq. ν₀ = 10<sup>13</sup> s

各時間ステップの処理：
- 各時間ステップ（1/ν₀ = 0.1 ps）ごとに
- 隣接サイトへ移動するか否かを確率論的に選択
- 隣接サイトへ移動（変位量dᵢ獲得）

#### 6.2.3 拡散係数の算出

1. 平均二乗変位と時間から拡散係数を算出：D = MSD/6t
2. キャリア濃度からNernst-Einstein式でイオン伝導率を計算

### 6.3 実用例：softBVソフトウェア

例えばsoftBVソフトウェアでは：
- Eや遷移経路、格子間サイトが求まるため
- それらをノード、経路をエッジとして
- 格子間サイトを経由したパスも加味したKMCを実行できる

**参考文献：**H. Chen, L. L. Wong, S. Adams, Acta Crystallographica Sec. B, 75 (1), 18 (2019).

ラフな計算方法（格子緩和やイオン相関無視）ではあるが、拡散の次元性や伝導率の絶対値の相対比較として便利。

**めちゃくちゃ簡単。でもあまり使われていない。**（単純に知られていない？難解な印象で敬遠？）

## 7. 拡散係数の導出と物質拡散の詳細

### 7.1 一次元ランダムウォークの詳細解析

#### 7.1.1 なぜ単位が二乗距離？：D (cm² s<sup>-1</sup>)

一次元のランダムウォーク（酔歩）の設定：
- p(+1) = 0.5，p(-1) = 0.5
- 左移動回数 nₗ，右移動回数 nᵣ
- 正味の右方向回数 m = nᵣ - nₗ
- 単位移動距離 d = 1
- 正味の移動距離 x = md

#### 7.1.2 統計的解析

移動距離xの平均値：

**⟨x⟩ = ∫_{-∞}^{∞} xW(x,t)dx = 0**

平均移動距離は0 → どれだけ変位したか不明

拡散により粒子がどれくらいの距離を動いたか（どの程度分布が広がったか）：二乗変位x²の平均値を用いる

**⟨x²⟩ = ∫_{-∞}^{∞} x²W(x,N)dx = 2Dt**

#### 7.1.3 確率分布関数

時間tにxにいる確率W(x,t)：

**W(x,t) = 1/(2√πdt) exp(-x²/4Dt)**

#### 7.1.4 粒子のジャンプ統計

粒子の単位時間あたりν回のジャンプ → 時間tにわたる総ジャンプ数N = νt → D = νd²/2

### 7.2 多次元への拡張

| 次元 | 拡散係数の関係式 |
|------|------------------|
| 一次元 | D = ⟨x²⟩/2t |
| 二次元 | D = ⟨r²⟩/4t |
| 三次元 | D = ⟨r²⟩/6t |

**参考文献：**小岩昌宏、中嶋英雄、材料における拡散 格子上のランダム・ウォーク、内田老鶴圃 (2009)

### 7.3 Fickの法則の詳細

#### 7.3.1 Fickの第一法則（定常状態の拡散）

**J = -D ∂c/∂x**

物質の拡散流束は濃度勾配に比例

パラメータ定義：
- J：流束（単位時間当たりの単位面積を通過する粒子数）[mol/m² s]
- D：拡散係数 [m²/s]
- c：粒子濃度 [mol/m³]

#### 7.3.2 外場印加時の修正

外場により一方向に駆動される粒子の流束は速度v [m/s]と粒子濃度c [mol/m³]を用いてvc [mol/m² s]

修正された式：

**J = -D ∂c/∂x + cv**

定常状態では流束J = 0となり：

**D ∂c/∂x = cv**

#### 7.3.3 Fickの第二法則（非定常状態の拡散）

**∂c/∂t = D ∂²c/∂x²**

拡散による濃度分布の時間発展を記述

### 7.4 Nernst-Einstein方程式の詳細導出

#### 7.4.1 ボルツマン分布と力の関係

外場による原子のポテンシャル φ(x)，イオン分布はボルツマン分布で表現：

**c(x) = const. exp(-φ(x)/kT)**

両辺を微分：

**dc/dx = -c dφ/kT dx**

原子にかかる力（駆動力）Fはポテンシャル φ(x)の位置微分：

**F = -dφ/dx**

したがって：

**dc/dx = cF/kT**

#### 7.4.2 流束の平衡条件

外場駆動の拡散と、それを打ち消し合う濃度勾配駆動の拡散流（Fickの第一法則）：

**D ∂c/∂x = cv**

流束は：

**J = cv = D cF/kT**

#### 7.4.3 電場印加時

外場Eにより電荷qが受ける力：

**F = qE**

流束：

**J = cv = Dcq/kT E**

電流密度は電荷×流束：

**i = qJ = q²cD/kT E**

#### 7.4.4 最終的なNernst-Einstein方程式

**σ = q²cD/kT**

**参考文献：**小岩昌宏、中嶋英雄、材料における拡散 格子上のランダム・ウォーク、内田老鶴圃 (2009)

## 8. トラッピング現象の詳細

### 8.1 歴史的背景と定義

現象としてなんとなく認識されていたが、プロトン伝導体で明確に提唱→以降、プロトン界隈で盛んに議論されている印象

**参考文献：**Y. Yamazaki, et al., Nat. Mater., 12, 647 (2013).

### 8.2 基本概念

何かしらの束縛：例えばドーパントと欠陥の静電相互作用など

エネルギー図：
- 通常のエネルギー障壁：E
- トラップによる追加エネルギー：E_B

### 8.3 滞留時間の詳細計算

#### 8.3.1 基本パラメータ

- t_n：正規位置の滞在時間
- t_T：トラップ位置の滞在時間
- c：トラップ濃度

粒子のN回ジャンプ（同じ移動距離）に要する時間：
- t_U：トラップ無し
- t'_U：トラップ有り

関係式：

**Dt_U = D't'_U** *同じ移動距離のため

#### 8.3.2 滞留時間の計算

粒子の滞留時間は配位数（そこへジャンプしうる近接サイト数）zと振動因子ν₀を用いて次式：

**t_n = (zν₀)⁻¹ exp(E/kT)**

**t_T = (zν₀)⁻¹ exp((E + E_B)/kT)**

#### 8.3.3 総滞留時間

**t_U = Nt_n**

**t'_U = N[(1-c)t_n + ct_T]**

### 8.4 みかけの拡散係数の導出

**D' = D × 1/[(1-c) + c exp(E_B/kT)]**

### 8.5 温度依存性

低温では E_a = E + E_B 高温では E_a = E

### 8.6 一般的適用性

キャリアが点欠陥の場合、いかなるイオン伝導種でも共通してトラッピングは存在するはず

**注記：**欠陥が高濃度かつ不規則分布した構造欠陥系ではトラッピング状態の定義が曖昧なためそれほど議論されていない

**参考文献：**小岩昌宏、中嶋英雄、材料における拡散 格子上のランダム・ウォーク、内田老鶴圃 (2009)

## 9. ブロッキング効果とパーコレーションの詳細

### 9.1 ブロッキング効果の定義

**注記：**イオン伝導体でも共通の概念だが、このフレーズで使われることは少ない

#### 9.1.1 基本式

ブロックサイト濃度cの時の拡散係数：

**D_b(c) = D(1 - bc)**

bの定義：副格子の次元/連結数で決まるブロッキング係数

#### 9.1.2 次元依存性

- 低次元（1）拡散ほどブロッキングが無限拡散を妨げる
- 高次元（2-3）拡散であれば、迂回可能

例：正方格子であれば、c = 0.5で無限拡散を妨げる（D_b(c) = 0）のでb = 2となる

#### 9.1.3 配位数効果

配位数が高いほどブロッキング効果は低い → c = 0.78以上で無限拡散不可

**参考文献：**小岩昌宏、中嶋英雄、材料における拡散 格子上のランダム・ウォーク、内田老鶴圃 (2009)

---

### 9.2 実例：Li₁₀GeP₂S₁₂でのブロッキング効果

Li₁₀GeP₂S₁₂において、人工的にab面内拡散経路のLiを固定化すると、自己拡散係数は0になる

**重要な注記：**
- *自己拡散係数は0 ≠ イオン伝導率は0
- MDで観測される一次元経路の自己拡散係数が0になる
- 面内拡散経路の中間サイトへの遷移を経る一種の活性化過程（フレンケル欠陥生成）が無限拡散に必須とも言える

**参考文献：**K. Miwa, R. Asahi, Solid State Ionics 361 (2021) 115567

---

### 9.3 パーコレーション理論の詳細

#### 9.3.1 基本概念

8×8正方格子での例：
- 原子は格子点から隣接格子点へ移動
- ブロッキングサイトの濃度がマクロな輸送特性を決める

例1：14/64がブロック → 78%の通過可能サイト → パーコレートする
例2：28/64がブロック → 56%の通過可能サイト → パーコレートしない

#### 9.3.2 詳細なパーコレーション閾値

56%の通過可能サイトではパーコレートしなかった → 通過可能サイトは59%以上必要

#### 9.3.3 パーコレーション閾値の理論値

| 次元 | 格子 | 配位数 | P(0,1) | 回帰確率 p_r | 正味訪問点 S_n | 臨界浸透確率 p_c(s) |
|------|------|--------|--------|--------------|----------------|---------------------|
| 1 | 直線 | 2 | ∞ | 1 | ~(8n/π)^{1/2} | 1 |
| 2 | 正方 sq | 4 | ∞ | 1 | ~πn/log n | 0.593 |
| 3 | 単純立方 sc | 6 | 1.51638 | 0.3405 | ~0.659n | 0.311 |
| 3 | 体心立方 bcc | 8 | 1.39320 | 0.2822 | ~0.717n | 0.246 |
| 3 | 面心立方 fcc | 12 | 1.34466 | 0.2563 | ~0.743n | 0.198 |
| 3 | 最密六方 hcp | 12 | 1.34466 | 0.2563 | ~0.743n | 0.204 |

**結論：**パーコレーションの閾値はキャリア副格子の次元と隣接サイト数で決まる

**参考文献：**小岩昌宏、中嶋英雄、材料における拡散 格子上のランダム・ウォーク、内田老鶴圃 (2009)

---

### 9.4 実例：Li₀.₃₈₈Ta₀.₂₃₈La₀.₄₇₅Cl₃

Li₀.₃₈₈Ta₀.₂₃₈La₀.₄₇₅Cl₃：3.0 mS cm<sup>-1</sup>

LaCl₃へのLi置換により伝導率向上 Li濃度が0.25以上で、Li channelとLa空孔を介した3Dパスを形成

- [LaCl₉] tricapped trigonal prism構造
- Li<sup>+</sup>イオンの配置
- **Li1 (channel sites)とLi2 (La-vacancy sites)**の存在

上下2 + 面内6方向の移動先と仮定すると、パーコレーションの閾値は約25%となり、イオン伝導率の報告範囲（Li₀.₂₅）と対応する (bccではないが、8配位を参考に…)

**結論：**骨格元素がキャリアと同サイトを占有する場合、パーコレーションの閾値に注意しよう

**参考文献：**Y. Yin, et al., Nature, 616, 77 (2023)

---

### 9.5 実例：パイロクロア型Li₂₋ₓLa₍₁₊ₓ₎/₃M₂O₆F

極めて高いイオン伝導率がパイロクロアで報告: AB₂O₆F：Li₁.₂₅La₀.₅₈Nb₂O₆F：bulk 7mS cm<sup>-1</sup>

我々も以前、取り組んでいたが伝導率が低く、深掘りしなかった：
LiSrNb₂O₆F：1.1 × 10<sup>-3</sup> mS cm<sup>-1</sup> at 673 K. J. Jpn. Soc. Powder Powder Metall. 2018, 65, 26−33.

Q なぜ伝導率がこんなにも違う？
A. サイトのLi濃度がパーコレーションするためには足りなかった
A. ブロッキング効果のあるSr濃度が高すぎた

**結論:パーコレーションの閾値は大事**

**参考文献：**A. Aimi, S. Yoshida, et al., Chem. Mater. 2024, 36, 3717−3725

### 9.6 実例：正極材料オリビン型LiFePO₄

オリビン構造（空間群：Pnma）：
- FeO₆八面体とPO₄四面体の骨格
- P-O結合が強固で構造安定性が高い
- リチウムの一次元チャンネル

反応：LiFePO₄ ⇄ FePO₄ + Li⁺ + e⁻

b軸方向のLiチャンネルでの1Dチャネル中の欠陥で挟まれたLiは動けない

例：LiとFeのanti-site欠陥

ブロッキングにより利用出来ない容量割合 ≈ 粒子サイズ

**結論：**粒子径減少により1D経路中の充放電に利用可能なLiサイト割合が増える

**参考文献：**R. Malik, G. Ceder, et al., Nano Lett. 2010, 10, 4123–4127

## 10. 混合効果

### 10.1 基本概念

骨格金属元素を混合すると伝導率向上

#### 10.2 具体例：Li₄SiO₄系

計算から複数種のカチオンを混ぜると伝導率が向上するとの報告

### 10.3 ハイエントロピー効果

ここ2-3年のバズワード：ハイエントロピー

配置エントロピー：**S_conf = -R Σ_{k=1}^n c_k ln(c_k)**

c_k：k-thサイトの濃度

混合エントロピー：**S_mix = -R Σ_{i=1}^m c_i ln(c_i) - R Σ_{j=1}^n c_j ln(c_j)**

- c_i：i-thのアニオン種の濃度
- n：アニオン種の数
- c_j：j-thのカチオン種の濃度

## 11. 誘起効果（Inductive Effect）の詳細

### 11.1 基本概念

電気陰性度差により生じる分極。また、分極の程度が隣接結合に及ぼす影響のこと。

### 11.2 メカニズムの詳細

#### 11.2.1 結合性と分極の関係

| M-Xの電気陰性度差 | M-X結合性 | 陰イオンX^{n-}の負電荷(n) | X-Liのクーロン相互作用 F = εq₁q₂/r² |
|-------------------|-----------|---------------------------|-------------------------------------|
| 大 | イオン結合性 | 大 | 強 |
| 小 | 部分的に共有結合性 | 中 | 弱 |

#### 11.2.2 具体例：Mg<sup>2+</sup>O<sup>2-</sup> vs Zn<sup>1.9+</sup>O<sup>1.9-</sup>

more covalent結合により：
- 負電荷：高 → 負電荷：中
- クーロン相互作用 強 → 弱

**結論：**電気陰性度差により生じる分極が小さいほど Li<sup>+</sup>の束縛が弱まる（動きやすい）

多様な構造にわたる大域的な傾向を説明できるほどの効果ではなく（おそらく）、同じ結晶構造中の構成元素の違いに着目して議論されることが多い（特に電解質）

### 11.4 実例1：K<sup>+</sup>伝導体

#### 11.4.1 Hollandite型K₂MgTi₇O₁₆

Mg<sup>2+</sup> → Zn<sup>2+</sup>置換：
- E_a = 1.16 → 0.54 eV
- 電気陰性度：O (3.34) > Zn (1.65) > Mg (1.31)

Mg-OよりZn-Oの方が共有結合性が強い → Oの有効負電荷が小さい → K-Oの静電相互作用が小さい

#### 11.4.2 二次元酸化物：K₀.₇(T₀.₃₅Sn₀.₆₅)O₂

T = Ca<sup>2+</sup>, Mg<sup>2+</sup>, Zn<sup>2+</sup>：
- σ = 4.5×10<sup>-7</sup>, 1.6×10<sup>-6</sup>, 7.5×10<sup>-6</sup> S cm<sup>-1</sup>
- E_a = 0.54, 0.52, 0.45 eV

**参考文献：**J. Etourneau, et al., J. Alloys and Comp., 188, 1 (1992).

### 11.5 実例2：Li<sup>+</sup>伝導体

#### 11.5.1 Li₁₀GeP₂S₁₂ vs Li₁₀SnP₂S₁₂

σ High > Medium

COHP (Crystal Orbital Hamilton Population)による化学結合性評価：
- COHP低：共有結合性が強い
- Sの負電荷が小さい

#### 11.5.2 結合解析結果

- S net atomic charge e：Ge-S結合 > Sn-S結合
- M-S bond polarity e：Ge-S < Sn-S
- Weaker attraction → Higher Li<sup>+</sup> mobility
- Stronger attraction → Lower Li<sup>+</sup> mobility

**参考文献：**S. P. Culver, J. Morgan, W. G. Zeier, et al., J. Am. Chem. Soc., 142, 21210 (2020).

電気陰性な金属を第三骨格元素として採用すれば M-Oの共有結合性が高まり、Li-Oの結合が弱まるはず

**陽イオン伝導体：**陰イオンに対して僅かにENが低いMを選ぶと良い → covalency in M-X, then weak Li-(X-M) bonding

**陰イオン伝導体：**X-M-FのX-MのEN差が小さいとFが易動？（I-Bi, S-Bi, Al-B?）

### 11.8 電極への応用例

→ OCV（平衡電位）に約600 mVの差

共有結合性：X-O > M-O

## 12. ペロブスカイト型Li<sup>+</sup>伝導体の詳細

### 12.1 基本特性

Li₂/₃₋ₓLi₃ₓTiO₃：σ_bulk ≈ 10<sup>-3</sup> S cm<sup>-1</sup>

**参考文献：**Y. Inaguma, et al., Solid State Commun., 86 (10), 689 (1993).

c軸二倍周期ペロブスカイト構造

- Aサイト（La）欠陥 + 二次Jahn-Teller効果
- Ti（d⁰）の空のt₂g（dyz, dzx）軌道とO2p軌道のπ混成によるSOJT
- TiはLa欠陥層方向へ変位

- La-poor層とLa-rich層の交互配列
- Interstitial Liの存在

Li-poor相（x ≈ 0.05, 上記構造）：二次元伝導
Li-rich相（x ≈ 0.11, Liがよりc軸方向に広く分布）：三次元伝導

あくまで平均構造であり、実際はLiとLaは近接配置をとらない

### 12.3 二次Jahn-Teller（SOJT）効果の詳細

#### 12.3.1 基本メカニズム

Ti（d⁰）の空のt₂g軌道（LUMO）と被占有O2p軌道（HOMO）の混成 → 結合性t₂g-O2p混成軌道形成 → 元のHOMO準位よりΔE分エネルギー利得

O2pとM t₂g軌道の準位差が小さいほど SOJT変位のエネルギー利得が大きい

イオン伝導率の傾向と対応：σ Nb, Ti > Ta > Zr

SOJT変位しやすい（3d-O2p軌道の準位差が小さい）方が、Li輸送時の活性化障壁の低減に有効と予想

M4d-O2p（M=Zr, Ta）よりM3d-O2p（Nb, Ti）がSOJT変位大

点群：O_h → SOJT歪み → 点群：C₄ᵥ
- Bd t₂g LUMO：e d_xy, d_yz
- O 2pπ t₁u HOMO：perturbation → ΔE
- ΔE∝ (E_LUMO-E_HOMO)⁻¹

### 12.4 パーコレーション解析

Li<sup>+</sup>Aサイト空孔濃度が約31-34%を境に伝導率向上

拡散機構：パーコレーションを考慮した空孔拡散機構

#### 12.4.1 副格子構造

ペロブスカイトのAサイトだけを考えた格子（Aサイト副格子）は単純格子
Liイオンの移動：単純格子におけるパーコレーション（浸透）で整理可能

パーコレーション閾値: Li浸透の閾値と実験結果の対応

**参考文献：**Y. Inaguma, et al., Solid State Ionics., 86-88, 257 (1996).

**結論：**パーコレーションとその閾値：マクロな輸送特性を支配するミクロ要因
他の材料系や合剤比率設計でも役に立つ

**参考文献：**稲熊宜之, 日本結晶学会誌 58，62-72(2016)

## 14. ボトルネック・臨界半径の詳細

ペロブスカイトBaLiF₃での計算例

基本パラメータ

- a = 3.99 Å
- r_Li = 0.76 Å
- r_F = 1.33 Å
- r_Ba = 1.61 Å

A2Bからなる三角形をボトルネック面積として：

**S = a²/2√2 = 5.66 Å²**

臨界半径の詳細計算 幾何学的関係式：

**(r_A + r_c)² = (a/2)² + (a/√2 - r_B - r_c)²**

臨界半径の計算式：

**r_c = [a²/4 + (a/√2 - r_B)² - r_A²] / [2(r_A + a/√2 - r_B)]**

数値代入：

**r_c = 0.77 Å ≪ r_F = 1.33 Å**

ボトルネック通過時の骨格陽イオンとの大きな重なり反発

骨格元素の分極率（電子雲の歪みやすさ）や原子変位能の重要性が窺える

- nsと2p軌道がつくる反結合性軌道とnp軌道の混成軌道
- 孤立電子対（lone pair）はns²電子のイメージだが、非対称的な局在化の由来はnp軌道との混成によるもの

Pb 6p：Anti-bonding（Pb 6s - O 2p）* + Pb 6p
Pb 6s：Bonding（Pb 6s - O 2p）

O 2p軌道との相互作用：
- Te 5p, Se 4p, S 3p
- O 2pz

**nλ = 2dsinθ**

### シェラーの式

**D = Kλ / (βcosθ)**

- D：結晶子サイズ

- β：半値幅

## 粉末X線回折測定の基礎

### 結晶系（Crystal system）

単位格子の形状の分類：

| 結晶系 | 格子定数の関係 | 格子角の関係 |
|--------|---------------|-------------|
| 立方晶系（cubic） | a = b = c | α = β = γ = 90° |
| 正方晶系（tetragonal） | a = b ≠ c | α = β = γ = 90° |
| 直方晶系（orthorhombic） | a ≠ b ≠ c | α = β = γ = 90° |
| 単斜晶系（monoclinic） | a ≠ b ≠ c | α = γ = 90°, β ≠ 90° |
| 三斜晶系（triclinic） | a ≠ b ≠ c | α ≠ β ≠ γ ≠ 90° |
| 六方晶系（hexagonal） | a = b ≠ c | α = β = 90°, γ = 120° |
| 菱面体晶系（rhombohedral） | a = b = c | α = β = γ = 120° |

（三方晶系（trigonal）：a = b ≠ c, α = β = 90°, γ = 120°）

### ブラベー格子（Bravais lattice）

合計14種類：

**立方晶系**
- 単純立方格子（cP）
- 体心立方格子（cI）
- 面心立方格子（cF）

**正方晶系**
- 単純正方格子（tP）
- 体心立方格子（tI）

**直方晶系**
- 単純直方格子（oP）
- 底心直方格子（oC, oA, oB）
- 体心直方格子（oI）
- 面心直方格子（oF）

**単斜晶系**
- 単純単斜格子（mP）
- 底心単斜格子（mC, mA, mB）

**六方晶系**
- 単純六方格子（hP）

**菱面体晶系**
- 単純菱面体格子（rP）

P: Primitive、I: Body centered、F: Face centered、C: C-face centered

## ミラー指数

ミラー指数 h k l：結晶方位・面を指定

- 特定の面（h k l）
- 等価な面の集合 {h k l}
- 特定の方位 [h k l]
- 等価な方位の集合 <h k l>
- XRD：Bragg反射の回折指数 h k l（括弧なし）

## 空間群

14種類のブラベー格子×対称操作 = 230種類の空間群

全空間群の情報：International Tables for Crystallography A

### 空間群の表記 Wxyz（P4/mmm, Fm-3mなど）

- W：ブラベー格子（P: Primitive, I: Body-, F: Face-, A: A-face-, B: B-face-, C: C-face centered, R: rhombohedral）
- x：主軸の対称操作（[001]軸）
- y：主軸と異なる軸回りの対称操作（立方晶 [111], 正方晶 [100], それ以外 [010]）
- z：さらに別の軸回りの対称操作（正方晶、立方晶 [110]）

### 対称操作の表記

| 記号 | 意味 |
|------|------|
| 1, 2, 3, 4, 6 | 回転軸 |
| m | 鏡映面 |
| 2<sub>1</sub> | 2回らせん軸 |
| 4<sub>2</sub> | 4回らせん軸 |
| a, b, c | 映進（グライド）面（軸方向に1/2並進+鏡映） |
| n | 対角映進面 |
| d | ダイヤモンド映進面 |
| - | 反転 |
| / | 軸と直交関係（例：4/m：4回軸と、直交する鏡映面） |

### 空間群から結晶系を見分ける方法

- 対称操作2個目（y）に3回（反）軸：立方晶系
- 対称操作1個目（x）に4回軸：正方晶系
- 対称操作1個目（x）に6回軸：六方晶系
- 対称操作1個目（x）に3回（反）軸 ∩ R：菱面体晶系
- 対称操作1個目（x）に3回（反）軸 ∩ P：三方晶系
- 対称操作1個表記かつ2回（螺旋）軸：単斜晶系
- いずれでもない対称操作3個表記：直方晶系

## 空間群の決定

### From scratch
1. 指数付け
2. 空間群候補の自動検索（*注意：自動提案された空間群が正しいか、3以降で検証するべき）
3. 指数付け結果に対して、消滅反射と観測反射を整理（手動）
4. 消滅則と照らし合わせて対称操作の有無を判断していく
5. 消滅則を満たす空間群の最終候補を決定（FOXと答え合わせ、FOXが必ずしも正解とは限らない）
6. その中でもっとも低い対称性の空間群でRietveld解析を行う（どの対称操作を考慮しないか、を押さえておく）
7. 精密化後の構造・座標を眺めて、考慮しなかった対称操作を導入しても問題がないか考える→必要に応じて対称操作を入れて再解析

推奨ツール：FOX、Conograph

### From related structure（同骨格構造の対称性違いがある場合）
1. 低角度側に反射があるか：長周期の超構造か判断
2.1. 単位格子が同じ場合：既知の空間群のT部分群（Translationengleiche subgroups）を探す
2.2. 単位格子が異なる場合（n倍周期）：既知の空間群のK部分群（Klassengleiche subgroups）を探す→大抵うまくいかないのでfrom_scratchで探すことが多い

部分群（subgroup）–超群（supergroup）の関係はInternational Table A1でまとめられている。詳しく勉強したい場合、対称性セミナーの受講を強く推奨。

## International Tables for Crystallography Aの見方

- **多重度**：単位格子内に何個の等価なサイトがあるか
- **Wyckoff記号**：単なる識別記号。それ自体に意味は無い
- **席対称性**：サイトを中心とした周辺環境の対称性

8iは結晶学的に等価な8個のサイトに対応。

- 結晶学的等価サイト（crystallographically equivalent）
- 結晶学的非等価サイト（crystallographically non-equivalent）

消滅則：特殊位置に原子が存在する場合に追加発生する消滅則

## 結晶構造解析

### Le Bail解析
格子定数+プロファイルパラメーター+バックグラウンドを精密化→指数付けの妥当性、格子定数の算出

### Rietveld解析
上記+構成原子（イオン）の内部座標、占有率、原子変位因子（温度因子）

想定されるモデルの妥当性をRietveld解析による構造精密化を通じて検証する。

**解析プロセス：**
- 初期構造モデル→理論回折パターン（構造パラメーター、プロファイル関数、バックグラウンド関数、粒子サイズなど）
- 実測回折パターンとの比較
- パターン残差の最小化（共役勾配法）
- 精密化構造
- 信頼度因子（R<sub>wp</sub>…）

F<sub>obs</sub>、F<sub>calc</sub>、F<sub>diff</sub>、Fourier合成、MEM密度分布解析も可能。

---

## Rietveld構造解析結果

**回折パターンの表示：**
- 赤点：実測値 I<sub>obs</sub>
- 実線：計算値 I<sub>calc</sub>
- フラッグ：理論Bragg反射位置（上から主相、第二相）
- 青線：残差曲線 I<sub>obs</sub> – I<sub>calc</sub>

残差曲線が平坦なほど構造モデルが実測XRDパターンをよく再現できている。

**精密化パラメータ：**
- 占有率（g）：原子（イオン）が占有する割合（確率）
- 内部座標（x y z）：分率座標
- 温度因子（B）：熱振動の大きさ

**信頼度因子：**
- R<sub>wp</sub>（weighted pattern）= 5%程度ならパターンの良い一致
- R<sub>F</sub>, R<sub>B</sub> = 5%程度なら良い構造精密化が出来ている

同じ結晶学サイトを占有する原子同士のパラメーターは線形制約条件を課した精密化。精密化されたパラメータは括弧付きで誤差を表示（e.g. 4.86(13) = 4.86±0.13）。

例：Li 48hサイト、占有率0.288
- 単位格子内に48個の結晶学的等価サイトが存在→48サイトのうち約14サイトをリチウムがランダムに占有
- Li<sup>+</sup>が高度に無秩序分布した構造でありLi伝導に有利
- Liが他の金属元素より広く熱振動

## 結晶構造解析からわかること

### 可動イオンの格子内分布：内部座標、占有率
- 平衡位置をつなぐイオン伝導経路を議論
- 最大エントロピー法（MEM）解析等から可動イオンの確率密度分布を解析→遷移状態を含めたイオン伝導経路の可視化→（Advanced）MEM-OPPによる移動障壁推定

## 温度因子

温度因子 or 原子変位パラメーター（atomic displacement parameter）：原子の平衡位置からの変位確率

**ρ(r) = ∫ p(t - r)ρ(r)dr**

- 平均電子密度
- 変位分布関数
- 電子密度

**調和振動：正規分布**

p(r) = 1/(2π)<sup>3/2</sup>σ<sup>3</sup> exp(-r<sup>2</sup>/2σ<sup>2</sup>)

**平均原子散乱因子**

f(k) = f(k)exp(-2π<sup>2</sup>k<sup>2</sup>σ<sup>2</sup>) = f(k)exp(-B(sinθ/λ)<sup>2</sup>)

k = 2sinθ/λ
B = 8π<sup>2</sup>σ<sup>2</sup>

- B：等方性温度因子（Isotropic ADP）
- 分散σ<sup>2</sup>：正規分布の標準偏差σの二乗
- β<sub>ij</sub>：非等方性温度因子（anisotropic ADP）

**非等方性温度因子の式：**

f(hkl) = k exp{-(h<sup>2</sup>β<sub>11</sub> + k<sup>2</sup>β<sub>22</sub> + l<sup>2</sup>β<sub>33</sub> + 2hkβ<sub>12</sub> + 2hlβ<sub>13</sub> + 2klβ<sub>23</sub>)}

熱振動を回転楕円体で考えると（等方的分布）：Thermal ellipsoid（熱振動楕円体）Probability of 50%

**温度因子の目安：**
- 軽元素：大きい温度因子（0.5〜2 Å<sup>2</sup>）
- 重元素：大きい温度因子（0.2〜0.5 Å<sup>2</sup>）

温度因子が大きいほどなだらかな確率密度分布→高確率に平衡位置から離れた位置まで変位→ポテンシャルフラットニング（平坦化）

温度因子が高いほどイオンの局所的な動きやすさを反映。異方性温度因子の大きさ（熱振動楕円体の形状）からイオン拡散経路を推定することができる。

**表記法の注意：**
- B<sub>eq</sub> ≠ B<sub>iso</sub>
- B<sub>eq</sub>：異方性温度因子を平均化
- B<sub>iso</sub> = B<sub>11</sub> = B<sub>22</sub> = B<sub>33</sub>（B<sub>12, 13, 23</sub> = 0）
- B = 8π<sup>2</sup>σ<sup>2</sup>
- U = B/8π<sup>2</sup> = σ<sup>2</sup>

## 一粒子ポテンシャル法（One Particle Potential: OPP）

Einsteinモデル（個々の原子が独立に振動）のもと、原子が平衡位置から変位（r）する際、周りの原子からの相互作用を熱振動ポテンシャルで表現。

**opp(r) = -kT ln(pdf(r - r<sub>0</sub>) / pdf(r<sub>0</sub>))**

確率密度関数（probability density function: pdf）：温度因子のフーリエ変換

**B(k) = ∫ p(r)exp(ikr)d<sup>3</sup>r**

pdf(p(r))：平衡位置の周囲に振動している孤立原子が、平衡位置の周囲で単位体積あたりに見出される確率の空間的、時間的平均

- 通常OPPは格子の熱膨張による僅かな効果は別として、温度にほとんど独立である
- 超イオン導電体：熱振動の振幅が平衡位置の間の距離と同程度に大きくなる場合がある。すなわち、平衡位置の中間でもpdfは値を持ち、隣接するイオンのOPPは互いに重なり合うので、重なる点の値からイオンの動きに対するポテンシャルの障壁の高さを推定することが可能

Advanced解析：温度因子から確率密度、ポテンシャルへ変換

## 密度分布の扱い方

実空間の3次元（xyz）+ 密度（ρ）= 4次元

**密度の種類：**
- NPD：核散乱長（fm）密度（ρ / fm Å<sup>-3</sup>）
- XRD：電子（e, not SI unit…）密度（ρ<sub>e-</sub> / e Å<sup>-3</sup>）
- MD、温度因子のフーリエ変換：原子存在確率密度（ρ<sub>Li</sub> / Å<sup>-3</sup>）

二次元スライス（xy）なら密度をz軸や色スケールで表示可能。

三次元空間上に密度分布を図示するには、"等値面（isosurface）表示+格子断面に密度の色スケール表示"が便利。

voxelサイズが大きいほど、voxelあたりの統計は高まるが、密度分布図が荒くなる→voxelの1辺の長さ：0.05 Åあたりがおすすめ。

特にXRD、NPDから得られた密度分布では対象原子以外の不要な情報を拾わない等値面を設定するとよい。

## フーリエ合成

逆空間から実空間へのフーリエ変換により、フーリエ合成が可能。
- XRD：電子密度分布
- NPD：核（散乱長）密度分布が得られる

**差フーリエ合成**
差分強度から差フーリエ合成を行うことで、Rietveld初期モデルで見逃していた原子の過不足情報を表す。差フーリエ合成密度分布で得られた過剰密度に新たなサイトを割り当てて再解析、など。

特に、差フーリエ合成は構造モデルの修正に便利。正確には強度ではなく結晶構造因子Fを元にフーリエ合成。

## 最大エントロピー法（Maximum Entropy Method, MEM）

観測情報を満足し、未観測情報に関してはバイアスを最もかけない形で解（電子密度、核密度）を得る手法。

熱力学のエントロピーの概念を情報理論に導入・発達した推論手法。画像処理分野で良く用いられる→解析手法を材料科学分野に逆輸入（高度解析でこういった逆輸入は結構ある。面白い）。

**結晶構造解析においては：**
- 観測情報：結晶構造因子F(obs)と対応する統計誤差σ
- 未観測情報：真の結晶構造因子F(calc)
- ➝統計誤差σの範囲内でF(obs)に一致する未知の結晶構造因子F(calc)を求める

ざっくばらんに言うと、総電子数や対称性の要請を満足する形で、voxel（pixelの3次元版）に対して電子（核）密度を割り当て、実測値の統計誤差の範囲に収まるように、試行錯誤して確からしい解へ導く。

**目的変数1（相対誤差）：**
C = (1/N)Σ<sub>k</sub>|F<sub>cal</sub>(k) - F<sub>obs</sub>(k)|<sup>2</sup>/σ<sup>2</sup>(k)

F<sub>cal</sub>(k) = VΣ<sub>r</sub>ρ(r)exp(-2πir・k)

**目的変数2（情報エントロピー）：**
S = -Σ<sub>r</sub>ρ'(r)ln(ρ'(r)/τ'(r))

目的変数1を最小化（|計算値–実測値|<sup>2</sup>/偏差）、目的変数2を最大化（エントロピー最大）→つまり、統計誤差の範囲に収まる再現精度で、高エントロピー（広がった分布、ぼやけた画像）な電子密度を求める。

### 解析上のパラメータ
1. E：Scaling factor σF * E
2. Number of F<sub>hkl</sub>（≒ d region）
3. Resolution：Number of mesh

- Eを1以上にすることで（通常1〜3）、標準偏差を大きく見積もり、解析を早期に（強制的に）収束させる。MEMのR値がRietveldの値以下となるようにする
- 出来るだけ多くのhkl反射を拾うことで、高解像度の電子密度が得られる。少ないhkl反射では、ぼやけすぎた密度が得られるので要注意
- TOF回折（NPD）では d > 0.5 Åのデータを用いる。High-Q（small-d）は（1）熱散漫因子の影響、（2）密集ピークが分離困難、（3）バックグラウンド分離が困難の理由で構造因子Fを正確に抽出することが困難

解析の妥当性：密度分布が解釈可能か、R値が低いか、（|F<sub>cal</sub>–F<sub>obs</sub>|/σ）<sup>2</sup>の分布が半値幅の狭いGaussian正規分布か

### 用途：イオン導電体のイオン拡散経路の可視化

LSGMの様々な温度における核密度分布、CeO<sub>2</sub>やα-Bi<sub>2</sub>O<sub>3</sub>の788℃における（110）など様々な伝導体で活用例がある。

**留意点：**
- 中性子回折データを用いることが望ましい
  - （1）XRDで得られる電子密度分布から、電子雲の広がりと原子の運動性を切り分けることは困難→核密度分布は結合電子などの電子雲の非調和成分情報を含まない
  - （2）Li<sup>+</sup>やO<sup>2-</sup>、F<sup>-</sup>などの軽元素が高コントラストに探測できる
- イオン伝導率が10<sup>-2</sup> S cm<sup>-1</sup>程度以上の温度域の回折データが望ましい

イオンの遷移過程が充分に回折データに含まれる（結晶構造因子Fに含まれる）必要がある。

さらに、MEMの確率密度分布（pdf）から一粒子ポテンシャルを求めることもできる。

## Advanced: 未知構造解析

初期構造モデルの決定に対応する。これまでに得られた結晶学的データ（格子定数、空間群）と反射強度から、初期構造モデルを決定する。

**アプローチ：**
- 逆空間法（直接法）…単結晶と一緒
- 実空間法…パターンを再現する原子配置を探索
- 双対空間法

**回折でわかること：**
- 回折は結晶構造のフーリエ変換
- 結晶構造→回折強度へは容易に変換できる
- でも回折強度は位相を失っているので、回折強度→結晶構造への直接変換はできない（位相問題）
- …だから未知構造解析はむずかしい！
- 初期構造モデルが決まれば、（粉末回折の場合）Rietveld解析へ進む

**とある実例：**
- 低角のデータのみで解析を行いたい…低角側にピークが多かった…高角度側のピークの重なりの分離が困難
- モデルの自由度の低さは、先行研究のデータからある程度カバーできる…組成から多面体やその配置を予測する
- 以上の理由から、実空間法を選択

## 結合原子価総和（Bond-Valence Sum, BVS）法

BVS：原子の酸化数（原子価）を、周辺原子との結合に割り当てる→配位数と結合長がわかれば、各結合の結合原子価の総和として中心原子の価数を簡便に見積もることができる。

**bond valence = exp((R<sub>0</sub> - R)/B)**

- R<sub>0</sub>, B：経験的パラメーター
- R：結合長

例：Si<sup>4+</sup>がO<sup>2-</sup>と1.61 Åで結合
- exp((1.624 - 1.61)/0.37) = 1.04
- 1.04（価数/結合）×4（結合）= +4.16

形式電荷と原子価結合法で求めた価数が近ければ、解析結果（原子間距離）の妥当性の裏付けとなる。

### BV energy landscape（BVEL）

BVS価数が形式電荷と一致する位置をエネルギー 0 eV（最安定）、形式電荷からずれるほどエネルギー増大。

**BVELの特徴：**
- 結晶構造中のエネルギーランドスケープを高速に計算
- 骨格構造さえわかれば、イオンの平衡位置、移動経路、遷移サイト、移動障壁を計算可能
- Rietveld解析の初期モデル中のLi配列決定や、精密化後の見落としサイトの有無の判断などに便利
- 簡便が故に、定量精度は低い（Morse型ポテンシャル型力場）。緩和や分極は考慮されない。あくまで参考値（特に非酸化物）

Stefan Adamsグループの**SoftBV**が使いやすい。

N = 1, T = 298 K

## まとめ：イオンの拡散経路の解析手法

### 実験：放射光X線/中性子回折データのRietveld構造解析

Rietveld解析によりキャリアイオンの温度因子（原子変位パラメーター）を解析。熱振動楕円体として熱振動をモデル化：異方性原子変位パラメーター。変位の方位からイオンの移動方位がわかる。各隣接サイト間の移動をつなぎ合わせてつながる長距離の拡散パスを見つけ出す→拡散経路を推定。

### 計算：エネルギーランドスケープ計算、反応経路探索、分子動力学計算

**Voxelに対するポテンシャル計算↔NEBによる反応経路探索**

結晶構造中の可動イオンのエネルギーランドスケープ：結晶構造中の各voxel（pixelを3次元に拡張した3次元メッシュ）に位置するイオンiと周辺原子jのポテンシャルの総和を割り当て、各voxelにおけるイオンiのポテンシャルを求める。

- 静電ポテンシャル+重なり反発：Morse potential
- 結合原子価法に基づく理想的な結合長をポテンシャルの極小値としてMorse potentialの形式へと拡張：Bond valence energy（BVE）

**Nudged Elastic Band法**：特定のポテンシャルを用いて、最小エネルギー障壁の移動経路を探索。NEB法は経路探索アルゴリズムであり、第一原理計算や他のポテンシャルと組み合わせて使われる。周辺原子の座標も最適化可能であり、イオンの移動過程の周辺原子の僅かな原子変位（緩和）の寄与も加味できる。

**分子動力学計算**：結晶構造中の可動イオンのDynamics（イオンの移動+平衡位置を中心とした熱振動）を観測。高温でのイオンのdynamicsを観測→統計的な情報を求めることができる。

- イオンの平均二乗変位（MSD）→ MSD-dtの傾きから自己拡散係数→イオン伝導率を計算可能
- 全計算時間におけるvoxelごとにイオンが存在する頻度から、確率密度分布が求まる→Boltzman分布に基づき確率密度分布からイオンのポテンシャルが求まる

イオン伝導率σ（S cm<sup>-1</sup>）は、比抵抗ρ（Ω cm）の逆数として定義され、イオンの流れやすさを表す指標である。定義には広義と狭義があり、本セミナーでは広義のイオン伝導率（Ionic conductivity）を使用する。狭義では超イオン導電率（superionic conductivity）と呼ばれ、超伝導（superconductivity）と区別される。

イオン伝導率は以下の式で表される：

**σ = 1/ρ = d/A × 1/R**

ここで：
- σ：イオン伝導率（S cm<sup>-1</sup>）
- ρ：比抵抗（Ω cm）
- A：表面積（cm<sup>2</sup>）
- d：長さ（cm）
- R：抵抗（Ω）

## 抵抗の測定方法

抵抗の測定には交流インピーダンス（電気化学インピーダンス、EIS）を使用する。

## 幾何サイズの測定

### 焼結体の場合
- 両面を十分に研磨する
- ノギスやマイクロメータで幾何サイズを計測する
- ペレットが歪な場合は複数回計測の平均値を使用する

### 圧粉体の場合
- プレス加圧成型を行う
- 高さを計測する

## 直流法による抵抗測定の難しさ

直流電圧（電流）を印加した際の電流（電圧）値から、オームの法則（V = IR）より全抵抗R<sub>dc</sub>を算出する方法には以下の問題がある：

**R<sub>dc</sub> = R<sub>wire</sub> + R<sub>ei</sub> + R<sub>b</sub> + R<sub>gb</sub>**

| 抵抗成分 | 説明 | 除外方法 |
|---------|------|---------|
| R<sub>wire</sub> | 配線抵抗 | ノンブロッキング電極、4端子電極で除外可能 |
| R<sub>ei</sub> | 電極界面抵抗 | ノンブロッキング電極、4端子電極で除外可能 |
| R<sub>b</sub> | 粒内抵抗（bulk） | 直流測定では分離不可 |
| R<sub>gb</sub> | 粒界抵抗（grain boundary） | 直流測定では分離不可 |

適切な試料作製の困難さも課題となる。

## 交流法による抵抗測定

交流電圧（電流）を印加し、応答電流（電圧）からインピーダンスZを計測する。

**Z = Z<sub>wire</sub> + Z<sub>b</sub> + Z<sub>gb</sub> + Z<sub>ei</sub>**

交流電圧の周波数を変えながらインピーダンスを計測することで：

| 周波数領域 | 時間スケール | 観測される成分 |
|-----------|------------|--------------|
| 高周波数 | 短時間スケール | 配線抵抗、バルク抵抗 |
| 中周波数 | 中時間スケール | ＋粒界抵抗 |
| 低周波数 | 長時間スケール | ＋電極界面抵抗 |

イメージ（正確性は別）として、高周波数では変位のみ、低周波数ではイオン移動が観測される。

---

## 電気回路とインピーダンスの基礎

### 回路素子の特性

| 素子 | 変数 | リアクタンス | 関係式 | 位相差 |
|-----|------|------------|--------|--------|
| レジスタ | レジスタンス R（Ω） | - | V = IR | 0° |
| キャパシタ | キャパシタンス C（F） | 容量性リアクタンス X<sub>C</sub> | V = (1/C)∫Idt | -90° |
| インダクタ | インダクタンス L（H） | 誘導性リアクタンス X<sub>L</sub> | V = L(dI/dt) | +90° |

## レジスタ(R)の特性

**Z<sub>R</sub> = R**

例：R = 50 Ωの場合、単体では測定レンジ外の高周波数側の配線抵抗やバルク抵抗成分として用いることが多い。

## キャパシタ(C)の特性

**Z<sub>c</sub> = 1/(jωC) = -j(1/ωC)**

極限値：
- lim<sub>ω→∞</sub>(-j(1/ωC)) = 0（高周波数）
- lim<sub>ω→0</sub>(-j(1/ωC)) = -j∞（低周波数）

ブロッキング電極（キャリアと反応しない電極）を表す。

## R//C並列回路

R//C並列回路のインピーダンスは：

**Z = R/(1 + (ωRC)<sup>2</sup>) - j(ωR<sup>2</sup>C/(1 + (ωRC)<sup>2</sup>))**

実数部と虚数部に分けて表現される。

極限値：
- lim<sub>ω→∞</sub>(Z) = 0 - j0 = 0
- lim<sub>ω→0</sub>(Z) = R - j0 = R
- lim<sub>ω→1/τ</sub>(Z) = R/2 - j(R/2)（半円弧の頂点に対応）

**RC並列回路の時定数：τ = RC**

**頂点周波数：f = ω/2π = 1/(2πRC)**
**Z' = -Z'' = R/2**

例：R = 100 Ω、C = 1×10<sup>-9</sup> Fの場合
- f ≈ 3 MHz
- τ = 50 ns

これは「抵抗を通る電流」と「コンデンサを通る電流」が同程度になる時間スケールを表し、半円弧の頂点に対応する。

## CPE（Constant Phase Element）

**Z<sub>CPE</sub> = 1/(Q<sub>0</sub>(jω)<sup>α</sup>)**

ここで0 ≤ α ≤ 1

| α値 | 極限値 | 等価素子 |
|-----|--------|---------|
| α→0 | Z<sub>CPE</sub> = 1/Q<sub>0</sub> = R | レジスタ |
| α→1 | Z<sub>CPE</sub> = 1/(Q<sub>0</sub>jω) = 1/(jωC) | キャパシタ |
| α = 0.5 | Z<sub>CPE</sub> = 1/(Q<sub>0</sub>√(jω)) | - |

低周波数側の様々な成分をR//CPEで片付けることも多い。ブロッキング電極ではあるが、僅かに反応する場合などに使用される。

## R//CPE並列回路

**Z = R/(1 + RQ<sub>0</sub>(jω)<sup>α</sup>)**

ここで0 ≤ α ≤ 1

極限値：
- lim<sub>ω→∞</sub>(Z) = 0
- lim<sub>ω→0</sub>(Z) = R

様々な理由でR//CではなくR//CPEで解析されることもある。

---

## バルク伝導を表すR//C並列回路

例：R = 200 Ω、C = 1×10<sup>-11</sup> Fの場合

| パラメータ | 値 |
|-----------|-----|
| 頂点周波数 f | ≈ 80 MHz |
| Z' = -Z'' | R/2 = 100 Ω |
| 時定数 τ | 2 ns |

**頂点周波数：f = ω/2π = 1/(2πRC)**

高周波数では変位のみ（イオンの微小変位による分極電流）、低周波数ではイオン移動（イオンの移動による電流）が観測される。境界となる周波数がf = 1/(2πRC)であり、これが時定数（緩和時間）τ = RCとなる。

## 材料の誘電率とキャパシタンス

バルク成分のキャパシタンスの考え方：

**C = ε'ε<sub>0</sub>(A/d)**

ここで：
- C：capacitance（F）
- ε'：permittivity（比誘電率）
- ε<sub>0</sub>：permittivity of free space（真空の誘電率）= 8.854×10<sup>-14</sup> F cm<sup>-1</sup>
- A：area（cm<sup>2</sup>）
- d：length（cm）

### 各材料のキャパシタンス（A：1 cm<sup>2</sup>、d：0.1 cm）

| 分類 | 組成 | 比誘電率 | キャパシタンス / F |
|------|------|---------|-------------------|
| **Oxide** | SiO<sub>2</sub> | 4-5 | 3.5×10<sup>-12</sup> |
| | Al<sub>2</sub>O<sub>3</sub> | 9 | 8.0×10<sup>-12</sup> |
| **Ferroelectric** | BaTiO<sub>3</sub> | 100-2500 | 8.9×10<sup>-10</sup> |
| | PbTiO<sub>3</sub> | 200 | 1.8×10<sup>-10</sup> |
| **Ionic conductor** | YSZ | 26 | 2.3×10<sup>-11</sup> |
| | Li<sub>7</sub>La<sub>3</sub>Zr<sub>2</sub>O<sub>12</sub> | 40-60 | 3.5×10<sup>-11</sup> |
| | Li<sub>1.3</sub>Al<sub>0.3</sub>Ti<sub>1.7</sub>(PO<sub>4</sub>)<sub>3</sub> | 32-77 | 2.8×10<sup>-11</sup> |

バルク伝導を表すR//C並列回路のキャパシタンスは材料の誘電率により異なるが、イオン伝導体の場合約10<sup>-11</sup> F前後となる。

---

## 粒界成分を表すR//C並列回路のキャパシタンス

Brick layer（wall）modelに基づくと：

- **C<sub>b</sub> = ε'ε<sub>0</sub>(A/d<sub>b</sub>)**
- **C<sub>gb</sub> = ε'ε<sub>0</sub>(A/d<sub>gb</sub>)**
- **C<sub>gb</sub> = C<sub>b</sub>(d<sub>b</sub>/d<sub>gb</sub>)**

ここで：
- d<sub>b</sub>：バルク（粒内）の厚さ
- d<sub>gb</sub>：粒界の厚さ
- d<sub>e</sub>：電極の厚さ

粒界のキャパシタンス：粒子バルクと粒界の空間スケールの比×バルクのキャパシタンス

| 試料タイプ | 結晶粒サイズ | 粒界キャパシタンス |
|-----------|------------|------------------|
| 焼結試料 | 大（結晶粒が成長） | 高い（～10<sup>-9</sup> F） |
| メカノケミカル合成試料 | 小 | 小さい（10<sup>-10</sup> F） |

## 不均一接触に由来する粒界抵抗（Fleig and Maier）

有限要素法（Finite element method, FEM）によるポテンシャル分布計算を行った結果：

| 周波数領域 | 電流分布 | 現象 |
|-----------|---------|------|
| 直流～低周波数 | 粒界近傍で電流集中 | current constriction |
| 高周波数（ω ≥ 1/RC） | 均一な電流密度分布 | 容量的に導通 |

**σ（S cm<sup>-1</sup>）/ ε（F cm<sup>-1</sup>）= 1/RC（Ω<sup>-1</sup> F<sup>-1</sup>）= ω（s<sup>-1</sup>）**

緩和周波数ω（=1/RC= τ<sup>-1</sup>）以上の高周波数では容量的に導通し、均一な電流密度分布となる。

Fleig and Maier：見かけの粒界抵抗が粒子同士の部分接触によるバルク内界面近傍の電流集中による（≈ バルク伝導率と相関）。粒界伝導率とバルク伝導率の活性化エネルギーが等しいことを説明するモデルである。

## 交流電圧の周波数を変えながらインピーダンスを計測（再掲）

### 高周波数（短時間スケール）：配線抵抗、バルク抵抗
- 例：100 MHz、10 MHz、1 MHz
- 300 Ω、1×10<sup>-11</sup> F（バルク）

### 中周波数（中時間スケール）：＋粒界抵抗
- 例：100 kHz、10 kHz、1 kHz
- 1,000 Ω、1×10<sup>-8</sup> F（粒界）

### 低周波数（長時間スケール）：＋電極界面抵抗
- R<sub>ei</sub> = 200 Ω（ノンブロッキング電極）
- R<sub>ei</sub> → ∞（ブロッキング電極）
- 1×10<sup>-4</sup> F

## イオン伝導率の解析：アレニウスプロット

イオン伝導率の温度依存性から活性化エネルギーを求める。

各温度におけるイオン伝導率を測定し、log(σT) vs 1000/Tでプロットする。

**Arrhenius equation：**
**σ = (σ<sub>0</sub>/T)exp(-E<sub>a</sub>/kT)**

変形すると：**log(σT) = log(σ<sub>0</sub>) - 2.303×E<sub>a</sub>/kT**

- log(σT) vs 1000/Tの傾きから活性化エネルギーE<sub>a</sub>が求まる
- slope = -2.303×E<sub>a</sub>/1000k

例：0.21 eV（単位換算：1 eV = 96.485 kJ mol<sup>-1</sup>）

固体ではy軸にlogσTを取る方が厳密だが、狭い温度範囲では大差が無いので、簡便にlogσを用いても良い。前指数項σ<sub>0</sub>が温度の逆数の影響を受けるかの違いがある。

バルク・粒界成分が分離できたら、各成分ごとにもプロットする。

## Nernst Einstein式を用いて伝導度拡散係数を求める

**σ = (Z<sub>c</sub><sup>2</sup>e<sup>2</sup>C/k<sub>B</sub>T)D<sub>σ</sub>**

ここで：
- C = N<sub>c</sub>/V（格子体積中のキャリア数/格子体積）
- Z<sub>c</sub>：電荷
- e：電気素量
- N<sub>c</sub>/V：格子体積中のキャリア数/格子体積
- k<sub>B</sub>：ボルツマン定数
- T：絶対温度

PFG-NMRや分子動力学計算で得られるトレーサー拡散係数D<sub>tr</sub>との比である**ハーベン比：HR = D<sub>tr</sub>/D<sub>σ</sub>**も重要な指標となる。

## サンプルの作製

相対密度を高めた緻密体を作製する必要（粒界成分を低減）がある。

**相対密度（%）= (ρ<sub>real</sub>/ρ<sub>theoretical</sub>) × 100**

ここで：
- ρ<sub>real</sub>：実測密度（g cm<sup>-3</sup>）
- ρ<sub>theoretical</sub>：真密度（g cm<sup>-3</sup>）

**ρ<sub>theoretical</sub>（g cm<sup>-3</sup>）= MW(g mol<sup>-1</sup>)×Multiplicity(-)/(N<sub>A</sub>(mol<sup>-1</sup>)×V(cm<sup>3</sup>))**

- 組成・構造が既知の場合：構造(cif)データから密度計算
- 新規組成の場合：XRDから格子定数を計算（CellCalc、簡易Rietveld、Lu Beilのパターンフィッティング等）

高温焼成やプレス等を経て相対密度90%以上を目指す。

新たな材料系を扱う場合、かつコールドプレス（室温プレス）で評価する場合、加重-変位(相対密度)特性を押さえておくと良い。

## 粉末の一軸成形

**実効圧力 = (シリンダの受圧面積/試料断面積) × 表示圧**

理研精器シリンダ：
- MS1-*：14.52 cm<sup>2</sup>
- MS05-*：7.16 cm<sup>2</sup>

### 各種成形・処理方法

| 方法 | 温度範囲 | 特徴 |
|------|---------|------|
| 打ち抜きペレット試料 | r.t.～600℃ | 打ち抜き後は弾性変形でやや膨張、粒界接触の悪化。ラフなスクリーニング目的 |
| 拘束ペレット試料（全固体セル） | -100～200℃ | 拘束治具とセルの耐熱温度範囲。一定トルクで拘束圧、弾性変形が少ない |
| ホットプレス | 100～600℃ | 可塑性の高い試料で特に有効 |
| 高温焼成 | 600～1200℃ | 焼結による粒界低減・粒子同士の接触改善 |
| 通電焼結（SPS） | 400-1000℃ | 焼結による粒界低減、低温化・短時間焼成の利点 |

## 電解質の電位窓測定

一定の速度（数mV sec<sup>-1</sup>等）で電圧を掃引しながら、電解質の酸化/還元分解に由来した応答電流を観測する。

### Cyclic Voltammetry（CV）から電位窓を測定
- Li溶解：Li → Li<sup>+</sup> + e<sup>-</sup>
- Li析出：Li<sup>+</sup> + e<sup>-</sup> → Li
- 電解質の酸化と還元

ピークの立ち上がりや、酸化還元電流の閾値を指標に電位窓を決定する。

### Linear Sweep Voltammetry（LSV）から電位窓を測定
酸化側と還元側の電位窓を個別に求めることもある。その場合、一方向の電位掃引なので、Liner Sweep Voltammetry（LSV）から電位窓を測定する。

## 定電流（CC; Constant Current）充放電測定

目的：電極の性能（容量、反応電位）を調べる

ガルバノスタット（電流(Galvano)を一定に保つ(stat)）を用いて、電流を流し、設定した上/下限電圧に到達するまでの時間・電圧を測定する。

**充電容量 q = ∫<sub>0</sub><sup>t<sub>1</sub></sup>|I(t)|dt（mA h）**
**放電容量 q = ∫<sub>t<sub>1</sub></sub><sup>t<sub>2</sub></sup>|I(t)|dt（mA h）**

プロセス：
1. 定電流印加
2. E ≥ E<sub>upper</sub>
3. 定電流印加
4. E ≤ E<sub>lower</sub>

容量をx軸にとり"充放電曲線"を作成する。不可逆容量も観測される。

## 定電流定電圧（CCCV; Constant-Current Constat-Voltage）充放電測定

ガルバノスタットを用いて電流を流し、設定した上/下限電圧に到達した後に、ポテンショスタットを用いて電圧を保持して、一定電流値（I<sub>lim</sub>）以下（or 一定時間経過）になるまで時間・電流を測定する。

プロセス：
1. 定電流(CC)充電
2. E ≥ E<sub>upper</sub>
3. 定電圧(CV)充電
4. I ≤ I<sub>lim</sub>
5. 放電電流印加
6. E ≤ E<sub>lower</sub>

CVでの適切な電位制御で高電位での分解反応を抑制可能である。

## 充放電曲線の形状からわかること：単相反応と二相共存反応

LiFePO<sub>4</sub>を例に：

### 反応経路のエネルギー
- Phase A → Phase B
- ΔG = G<sub>B</sub> - G<sub>A</sub> = const.（二相共存反応、E = const.）
- ΔG = (∂G<sub>A</sub>/∂n)、ΔG = (∂G<sub>B</sub>/∂n)（単相反応、E：連続的変化）

最安定な反応経路が赤破線の経路となる。

ポイント：分極が無視できる程度の小さい電流値で(充)放電する、もしくは充放電過程の緩和後のOCV（GITT等）から、平衡状態の熱力学的な反応電位を調べることができる。

## 定電流間欠滴定法（GITT）

パルス電流ステップと緩和測定を繰り返し、平衡状態から非平衡状態への緩和過程を観測し、平衡電位を調べる、電極内のリチウムイオン拡散を調べる。

短時間の定電流パルスと長時間の休止期間を組み合わせる。

電流印加直後の短い時間（t ≪ L<sup>2</sup>/D<sub>s</sub>）の電位変化：

**E = E<sub>0</sub> - IR - (2bIV<sub>m</sub>/√(πFS))√(τ/D<sub>s</sub>)**

ここで：
- E<sub>0</sub>：平衡電位
- R：抵抗
- V<sub>m</sub>：モル体積
- b：dE/dxの傾き
- S：反応面積
- F：ファラデー定数
- L：膜厚
- D<sub>s</sub>：化学拡散係数

試料形態が集電体上の厚さLの膜のとき、以下が可能：
- 充(放)電過程の平衡状態の電位を調べる
- 電極内のリチウムの化学拡散係数を調べる
- 熱力学的反応電位の理解
- 二相反応か、単相（固溶）反応かの判別

容量Qを電圧Vで微分 → 電圧変化に対する容量変化率

特徴：
- ピーク位置：反応電位、ピーク面積：反応容量に対応
- 容量劣化の要因プラトーの推定に有効
- 充放電過程の反応機構の分離・識別
- サイクル間の差分解析で劣化機構の特定が可能

電圧Vを容量Qで微分 → 容量変化に対する電圧変化率

特徴：
- 電圧変化領域の特定
- 電池の内部抵抗変化の検出に有効

サイクル間の差分解析で劣化機構の特定が可能である。`

フッ化物イオン（F<sup>-</sup>）は固体中で高速なキャリアイオンとして機能する。一価の負電荷を持つF<sup>-</sup>は、酸化物イオン（O<sup>2-</sup>）と比較して電荷密度が低く、カチオン骨格との静電相互作用が弱いため高い移動度を示す。フッ化物イオンの物理化学的特性として、イオン半径（Ⅵ配位）は1.33 Å、最外殻軌道半径は0.36 Å (2p)、分極率は1.04 Å<sup>3</sup>である。他のハロゲン化物イオン（Cl<sup>-</sup>: 2.88 Å<sup>3</sup>、Br<sup>-</sup>）と比較してF<sup>-</sup>は分極率が低いにもかかわらず高いイオン伝導率を示すが、これは結晶構造中のボトルネックを通過する際の骨格金属との幾何的な反発が小さいためである（大きすぎず、小さすぎない）。
フッ素は最も電気陰性度が高く（3.98）、高い酸化還元電位（F<sub>2</sub>/F<sup>-</sup>: +2.87 V vs SHE）を持つため、電気化学的に最も安定なアニオンといえる。この特性により、フッ素ガス発生電位以下の幅広い電位範囲で電極反応を利用することができ、フッ化物に基づく電池は高電圧化が本質的に期待される。対カチオンとして13-15族元素を用いた場合、高い分極率のカチオンと組み合わせたPbSnF<sub>4</sub>は室温で約10<sup>-2</sup> S cm<sup>-1</sup>の顕著に高いフッ化物イオン伝導率を示すが、この記録は長年にわたり更新されていない。
フッ化物イオン伝導体の歴史は1839年にファラデーがPbF<sub>2</sub>におけるフッ化物イオン伝導を報告したことに始まる。1970年代後半からはPbF<sub>2</sub>を高イオン伝導性フッ化物を電解質として用いた薄膜フッ化物電池が研究され、Pb/PbF<sub>2</sub>/CuF<sub>2</sub>系の電池は約0.7 Vの作動電圧を示し室温での動作が可能であった。2011年にReddyらにより低電位作動の負極材料LaF<sub>3</sub>と高電位作動Cu、固体電解質としてLa<sub>0.9</sub>Ba<sub>0.1</sub>F<sub>2.9</sub>の組み合わせで理論作動電位が3Vを超える固体電池の充放電が報告され、フッ化物イオン電池はポストリチウムイオン電池として注目を集めている。

## 全固体フッ化物電池の理論的優位性

全固体フッ化物電池（ASSFIBs）において、Cu正極とLaF<sub>3</sub>負極の場合、理論セル電圧は約3.1Vとなり、理論体積エネルギー密度は約5,600 Wh L<sup>-1</sup>に達する試算である。これはリチウムイオン電池の約2倍に相当する。この高エネルギー密度は多電子反応に由来し、多くのフッ化物電極材料では一つの金属イオンあたり複数のF<sup>-</sup>イオンが関与する反応が可能である。例えばCuF<sub>2</sub>では一つのCu原子あたり2つのF<sup>-</sup>が反応し、Cu/CuF<sub>2</sub>は約700 mAh g<sup>-1</sup>の高い理論容量を持つ。

## 主要な構造ファミリー

### 蛍石型構造

蛍石型構造は最も詳細に研究されてきた構造であり、面心立方格子のカチオン格子内における四面体中心に規則的なフッ素サイトを特徴とする。LaF<sub>3</sub>を高ドープしたBaF<sub>2</sub>の高いF<sup>-</sup>伝導率は1981年にWeppenerらによって報告された（Ba<sub>0.55</sub>La<sub>0.45</sub>F<sub>2.45</sub>: σ = 2×10<sup>-7</sup> S cm<sup>-1</sup>）。Moriらの中性子回折研究により、四面体サイトと八面体サイト間のフッ化物イオン伝導経路が示された。

2000年にMeyerによりBaF<sub>2</sub>-CaF<sub>2</sub>積層薄膜中での高速イオン伝導が報告され、その後メカノケミカル法で合成された多結晶体においても中間組成で同様のイオン伝導率の極大値が観測されている。Moriら（ACS Appl. Energy Mater. 2024, 7, 7787–7797）およびA. Düvelら（J. Am. Chem. Soc. 2017, 139, 5842-5848）により局所的な歪みがF<sup>-</sup>伝導を加速することが報告された。最近、Ogawaら（J. Mater. Chem. A, 2024, 12, 31173）は、伝導率向上の主因は移動エネルギーの変化ではなく欠陥形成エネルギーの低下にあることを示した。

### 層状蛍石型構造

層状蛍石型PbSnF<sub>4</sub>は1988年に初めて合成され、DonaldsonらやKannoらはHF雰囲気での焼結やZr置換によるイオン伝導率の向上を報告し、外因性の過剰フッ素導入の重要性を強調した。Unoらはメカノケミカル的に合成したPbSnF<sub>4</sub>がポスト熱処理と組み合わせることで3.0×10<sup>-2</sup> S cm<sup>-1</sup>の伝導率を示すことを報告した。これは我々の知る限り、F<sup>-</sup>伝導率の世界記録である。G. Dénèsらは中性子回折と<sup>119</sup>Sn Mössbauer分光法を用いて、Sn<sup>2+</sup>の配位環境と電荷密度を系統的に調査した。彼らの研究によると、Snの立体活性孤立電子対は正方晶PbSnF<sub>4</sub>のc軸に沿った[Sn-Sn]層間に向けられている。BaSnF<sub>4</sub>はDonaldsonらによって約10<sup>-4</sup> S cm<sup>-1</sup>の伝導率を示すことが報告されたが、最近Mori, Mineshigeらによって報告された機械化学的に合成されたBa<sub>0.9</sub>Sn<sub>1.1</sub>F<sub>4</sub>は高い室温イオン伝導率（4.1×10<sup>-3</sup> S cm<sup>-1</sup>）を示す。

### タイソナイト型構造

タイソナイト構造において、約5%のアルカリ土類金属置換で特に高いイオン伝導率が観察される。高橋らによって1981年頃に報告されたCe<sub>0.95</sub>Ca<sub>0.05</sub>F<sub>2.95</sub>など、Ceベースのシステムが最も高い伝導率を示す。最近の分子動力学計算の研究では、格子サイズと金属元素に対する伝導率依存性を包括的に調査し、フッ化物イオン伝導に最適な三価の金属元素がCeであることを明らかにした。また、Ce<sub>0.95</sub>Sr<sub>0.05</sub>F<sub>2.95</sub>において、粒界に存在する第二相の蛍石相が粒界抵抗を低減し、全イオン伝導率を向上させることが報告されている。

### ペロブスカイト型構造

ペロブスカイト型フッ化物ではフッ素欠損型CsPb<sub>0.9</sub>K<sub>0.1</sub>F<sub>2.9</sub>が室温で10<sup>-3</sup> S cm<sup>-1</sup>という高い伝導率を示す。我々はCsPb<sub>0.9</sub>K<sub>0.1</sub>F<sub>2.9</sub>が特異的に低い活性化エネルギー8 kJ mol<sup>-1</sup>と高いバルクのイオン伝導率3×10<sup>-3</sup> S cm<sup>-1</sup>を示すことが報告された。最近、K<sub>2</sub>NiF<sub>4</sub>型構造を持つ酸化物の４電子反応を利用した正極材料として有望であることが報告されている。これらの材料では、岩塩層内の格子間位置にフッ素がインターカレーションされる。

### その他の構造系

Anti-α-AgI型構造では、高分極性カチオン（Tl<sup>+</sup>やPb<sup>2+</sup>）がbcc格子を形成する。RbPbF<sub>3</sub>は室温で約1.4×10<sup>-5</sup> S cm<sup>-1</sup>のフッ化物イオン伝導率を示す。Pb<sub>2/3</sub>K<sub>1/3</sub>F<sub>5/3</sub>は247℃で4×10<sup>-1</sup> S cm<sup>-1</sup>という極めて高いフッ化物イオン伝導率を示す。

## In-silico構造生成（In-silico structural generation）

### 背景
- イオン導電は「構造」物性
- 既知構造ベースの材料探索はすでに"red ocean"
- 新規構造を発見すること自体に高い意義がある（新規相からさらに元素置換を展開＝広い材料空間を提供）

### 実験的な新規構造の発見と構造解析の高いコスト
1. 未知相にたどり着けるか（確率論的）
2. その存在に気づけるか（主観性）
3. 組成と温度の多次元空間の中から未知相を単相化できるか（試行錯誤）
4. 未知構造の格子サイズと空間群を決定（解析的に求まるが、高難易度かつ一意に決まらない対称操作もある）
5. 未知構造の原子配列を決定（モンテカルロ、確率論的）
6. 回折パターンを再現する構造モデルの作製と精密化のloop（Rietveld⇄モデル修正）

### 考えたこと
- 計算から構造を探索できないか？
- 少なくとも原子配列は直説法ではモンテカルロ的に決めているので、計算始点でもできるはずでは？

### 課題
- フルスクラッチで構造を生成する場合、格子サイズ、元素種、元素比率、原子座標(xyz)の自由度
- 組成が既知の場合：原子座標の組み合わせ ∝ exp(単位格子あたりの原子数)
- 組成未知の場合：組成を変えながら探索することになるが、安定構造の存在しない組成（単位格子内の元素比）での（ほぼ）無意味な構造探索を強いられる
- 組成未知のin-silico構造生成は非現実的

## 組成の類似度：超重要

### Earth Mover's Distance (EMD)
- Euclid distanceではなく、Earth Mover's Distance (EMD)を用いて組成の類似度を定義
- EMDはヒストグラムや確率分布などのデータ間の非類似度として利用可能
- 特徴量空間としてModified Pettifer numberを利用

### データセット
- ICSDから188,631のcif
- 842個のイオン伝導体の組成（and構造）を準備

### 結果
- EMDで類似組成をICSDで検索：21人の研究者が合致するか判断
  1. EMDで528の化合物が完全or僅かな組成ズレのもと、ICSDレポジトリと合致
  2. 残りの254の化合物が元素置換や構造が類似したもの
  3. 60の化合物が合致せず（レポジトリに単純に存在しない？）
- 距離1以下のcriteriaのもと、5.7%のF/Pレート

### 次元削減と可視化
- 二元系化合物でEMD尺度の多次元空間をUMAPを用いて次元削減
- 特徴量はmodified Pettifor number
- クラスター解析はDBSCANで実施
- 原子番号の特徴量+EMDはうまくクラスターが別れない
- メンデレーエフ数なども加味したが、modified Pettifor numberが最もよくクラスターを分類してくれる
- Magpie特徴量+ユークリッド距離もうまくクラスターが別れない

### UMAP vs PCA
- ICSD全てに対してModified Pettifor numberの特徴量でEMDで次元削減
- 電気陰性度の標準偏差から、ionicかcovalentをカラースケールでプロット
- 元のEMD距離と次元削減後の空間中のユーグリッド距離のPearson相関係数を比較
- UMAPは歪んだ空間のため、次元削減後のユーグリッド距離そのものは回帰学習の特徴量として使うべきではない
- 仮に高次元（5次元）まで使用したとしても意味がない

### まとめ
- 教師なしのクラスター解析やドメインを可視化したいなら：UMAP + 密度ベースのクラスター解析（DBSCAN）
- 非類似度を特徴量として使いたいなら：PCAで次元削減して主成分1~3（…10）を使うべき
- ソース：https://github.com/lrcfmd/ElMD/
- 特徴量として色々選べる。上の文献はmodified_pettifierを利用
- EDMで非類似度を定義

## 局所構造特徴量

### Local structure order parameters (LoStOPs)
- 局所的な配位構造の定義手法を提案
- LoStOPsを利用して局所構造特徴量を作製し、61の既知の局所構造と40の一般的な結晶構造の類似度を定義
- MPに登録された70,000件の構造間の構造類似度評価指標を作製

### 利用可能なツール
- 全ての手法とアルゴリズムはpymatgenのlocal_envモジュールとmatminerのfeaturizersモジュールで自由に利用可能
- Matminer：https://hackingmaterials.lbl.gov/matminer/
- pymatgen：https://pymatgen.org/pymatgen.analysis.local_env.html?highlight=zimmermann
- 難解なので詳細は飛ばすが、最終的にはCrystalNNでよいとのこと

### 構造ファミリー研究
- O. Muller and R. Roy, The Major Ternary Structural Families, Springer-Verlag, Berlin, Germany, 1st edn, 1974
- 主な三元系構造ファミリーを使用
- 歪んだスピネルであるhausmanniteを削除するなど、一部改変
- MPから空間群と組成式が一致する構造を抽出
- structure matcher(pmg)で構造が合致するか確認
- 6258構造with40prototype-structureを生成（MPの約10%に相当）

### 最適な組み合わせ
1. 構造fingerprintを使用
2. cosine距離を使用
3. 構造fingerprintはサイトfingerprintのmean、std dev、max、min、…を組み合わせて117種類を作製
4. 40の構造系の数に対応して重みづけをかけた（データ偏りをなくすため）
- 最高性能の組み合わせ（OVL: 1.9%）：CrystalNNFingerprint with "ops" preset、全ての追加フラグをオフ、統計タイプとしてmeanとmaximum、比較メトリックとしてdistance

### MACEのアーキテクチャ
- SoTAの精度：
  - Energy：5 meV atom<sup>-1</sup>
  - Force：0.1 eV Å<sup>-1</sup>

#### 一般的なLocal MLIP
- 原子密度、結合長、角度ベースの回帰モデル（線形~kernel~NN）
- 計算効率が高いが、系が複雑（構成元素↑）になるほど計算効率が下がる（組み合わせ爆発）
- 最近のLMLIPは原子クラスター展開を採用し、効率的に多体間項を取り入れている

#### Graph MLIP
- メッセージ伝達ニューラルネットワーク
- 系の複雑さに対してロバストだが、多体間相互作用の表現が苦手（？）
- 最近のGMLIPは、多体間相互作用を取り入れる設計
  - 三体間相互作用を取り入れたM3GNet
  - 原子クラスター展開を取り入れたMACE

#### 原子クラスター展開
- 原子iの全隣接原子の距離等の評価→原子i近傍の原子密度分布関数として表現

### MACE詳細
- https://www.doc.ic.ac.uk/~bkainz/teaching/DL/notes/equivariance.pdf
- IP：順伝搬NN、ガウス過程回帰、線形回帰
- GNN：二体間相互作用 for DTNN、SchNet、HIP-NN、PhysNet、or DimeNet
- MACE：多体間相互作用を取り入れた（M3GNetとの違いとは）

#### アーキテクチャ：Message Passing Neural Network（Graph NNの一種）
- σ<sub>i</sub><sup>(t)</sup> = (r<sub>i</sub>, z<sub>i</sub>, h<sub>i</sub><sup>(t)</sup>)
- r<sub>i</sub> ∈ ℝ<sup>3</sup>：r<sub>i</sub>は3次元実数ベクトル空間ℝ<sup>3</sup>に属する
- h<sub>i</sub><sup>(t+1)</sup> = U<sub>t</sub>(σ<sub>i</sub><sup>(t)</sup>, m<sub>i</sub><sup>(t)</sup>)
- m<sub>i</sub><sup>(t)</sup> = ⨁<sub>j∈N(i)</sub> M<sub>t</sub>(σ<sub>i</sub><sup>(t)</sup>, σ<sub>j</sub><sup>(t)</sup>)
- E<sub>i</sub> = Σ<sub>t=1</sub><sup>T</sup> R<sub>t</sub>(σ<sub>i</sub><sup>(t)</sup>)

### MACE学習
- 200エポック、40-80 NVIDIA A100 GPU、10-20ノード
- 中規模モデルの学習：約2,600 GPU時間
- TSUBAME：Tesla P100 × 4、4GPU × 30 node = 80 GPUs
- 2600GPU hours/80GPU = 40hours

### MACEパラメータ詳細

- --name="MACE_model"：名前
- --train_file="train.xyz"：必ず指定
- --valid_fraction=0.05：個別に指定もできるようだが、これでOKか
- --test_file="test.xyz"：必ず指定
- --model="ScaleShiftMACE" or "MACE"：ScaleShiftMACEが安定して精度も高いが、孤立原子の計算には向かないため結合が切れる計算には不適
- --hidden_irreps='128x0e + 128x1o'：隠れ相、0eだけだとinvariant、1o 2eがequivariant。128 channelの意味が実はわかっていない。Medium：'128x0e + 128x1o'？Mediumで十分っぽい。より高次の項を加味するなら'128x0e + 128x1o + 128x2e'
- --num_interactions：メッセージ伝達layerの数、多すぎるとあかん
- --correlation=3：多体間相互作用の次数。3なら4体間。2layerで4体間だと、結果的に13体間となるらしい
- --l_max=3：角度の解像度。解像度以下は同じ角度とみなす（単位がわからん）高い値ほど精度はあがるが遅くなる。default l=3
- --r_max=6.0：cutoff radius mace-mp-0は6 Å、layer数×rmaxの距離を学習することになる
- --energy_key='energy'：keyを入れると読み込むらしい
- --forces_key='forces'：keyを入れると読み込むらしい
- --stress_key='stress'：keyを入れると読み込むらしい
- --E0s="average"：原子の基準エネルギーを最小二乗法で求める
- --swa：損失関数のenergyの割合を途中から増やす
- --start_swa：swaを起動するepoch数
- --default_dtype='float32' or 'float64'：float32が2倍早いが精度がやや劣るとのこと。MDはfloat32でOK
- --ema：???
- --ema_decay=0.99：????
- --num_interactions=2：number of layers、typically 2
- --max_ell=2：expansion order of spherical harmonic edge attributes
- --max_num_epochs：mace-mp-0では200、max_num_epochs×num_configs_training/batch_site = 200kがおすすめとのこと
- --batch_size：100k × 200 / batch = 200k → batch = 100
- --valid_batch_size：↑と同じにしておく？
- --patience：入れるとearly stopingしてくれるらしい（本当か？）
- --eval_interval：evalで評価するインターバル、いらないかも
- --amsgrad：adamsのoptimizerの一種
- --restart_latest：これを入れておくとcheckpointsのベストなモデルで再開してくれる
### 注意事項
- Self-consistent loopが収束しない計算は教師データから外す
- loss functionはMSEよりRMSEが良いとのこと

## VASP

### 注意事項
- 計算理論の専門家ではない
- 実用的な使用法と非常にシンプルで限定的なDFTの側面のみをカバー

### VASP概要
- VASP：密度汎関数理論のための第一原理計算パッケージ
- 入力ファイル：
  - INCAR：パラメータ
  - POTCAR：ポテンシャル
  - KPOINTS：k点
  - POSCAR：初期構造

### 最適化プロセス

#### 電子密度の最適化（Electronic loop）
1. 初期電子密度を設定：E<sub>n</sub> = …（n=1）
2. 勾配法（？）で電子密度を変更：E<sub>n+1</sub> = …、ΔE = E<sub>n+1</sub> - E<sub>n</sub>
3. ΔE < EDIFFまでループ
→ 収束した電子密度とエネルギー

#### 構造最適化（Ionic loop）
1. 各原子の力を計算：F<sub>i</sub> = -∂E/∂R<sub>i</sub>
   - F<sub>i</sub>：i番目の原子の力
   - E：系のエネルギー
   - R<sub>i</sub>：i番目の原子の座標
2. 力ベクトルに沿って原子を変位
→ 緩和構造
各原子の力がEDIFFG以下になるまでループ

---

### エネルギーと相対エネルギー

#### 最適化されたターゲット系Xのエネルギー
- E<sub>X</sub> = -5 eV
- ✗ エネルギー自体の絶対値は意味がない
- ◯ 相対エネルギーを使用

#### 相対エネルギーの種類

1. **反応エネルギー**
   - 反応物と生成物間の相対エネルギー
   - A + B → AB、E = E(AB) - (E(A) + E(B))

2. **生成エネルギー**（Gibbs生成エネルギーのような）
   - 金属（および/またはガス）から化合物への反応エネルギー
   - 2Li + S → Li<sub>2</sub>S：E<sub>formation</sub> = E(Li<sub>2</sub>S) - (2×E(Li) + E(S))
   - 3Li + P + 4S → Li<sub>3</sub>PS<sub>4</sub>：E<sub>formation</sub> = E(Li<sub>3</sub>PS<sub>4</sub>) - (3×E(Li) + E(P) + 4×E(S))

3. **Energy above the convex hull**
   - 競合相とターゲット系の間の相対エネルギー
   - 2Li + S → Li<sub>2</sub>S：E<sub>hull</sub> = E(Li<sub>2</sub>S) - 2×E(Li) - E(S)
   - 3/2Li<sub>2</sub>S + 1/2P<sub>2</sub>S<sub>5</sub> → Li<sub>3</sub>PS<sub>4</sub>：E<sub>hull</sub> = E(Li<sub>3</sub>PS<sub>4</sub>) - (3/2×E(Li<sub>2</sub>S) + 1/2E(P<sub>2</sub>S<sub>5</sub>))

4. **Migration energy**
   - 安定点とサドルポイント間の相対エネルギー
   - E<sub>mig</sub> = E(saddle) - E(initial)

5. **欠陥形成エネルギー**
   - 内在欠陥：
     - Frenkel：M<sub>M</sub> + V<sub>i</sub> → V<sub>M</sub> + M<sub>i</sub>
     - Schottky：M<sub>M</sub> + X<sub>X</sub> → V<sub>M</sub> + V<sub>X</sub> + MX
   - 外因性欠陥：MO<sub>2</sub> → x/2O<sub>2</sub> + MO<sub>2-x</sub>
   - ドーピング：MO<sub>2</sub> + 0.1AO → M<sub>0.9</sub>A<sub>0.1</sub>O<sub>1.9</sub> + 0.1MO<sub>2</sub>

**相対エネルギーは反応によって厳密に定義される！！**
言い換えれば、上記のメトリクスを得るために事前に反応を定義する必要がある

### 生成エネルギーの曖昧さ
- ほとんどの場合、生成エネルギーは金属（および/またはガス）から化合物への反応エネルギーによって定義される
- このコンテキストはMaterials Projectで一般的
- しかし、生成エネルギーは任意の反応に対してしばしば与えられる
- いずれにせよ、反応を指定することで生成エネルギーを定義する必要がある

### Materials Projectにおける生成エネルギーとE<sub>hull</sub>
- 生成エネルギー ≠ E<sub>hull</sub>
- 生成エネルギーは金属（および/またはガス）から化合物への反応エネルギーによって定義される
- Li<sub>2</sub>S + S → 2LiS
- E<sub>hull</sub>(LiS) [eV atom<sup>-1</sup>] = (2E(LiS) - E(Li<sub>2</sub>S) - E(S))/4

### Energy above the hullの計算
1. 化学系内の安定エントリ（●）を特定（相図を作成）
2. ターゲット化合物の競合相を特定
3. 分解反応を定義してΔEを計算（DE = -E<sub>hull</sub>）

### E<sub>hull</sub>の実用的な計算

${codeBlock}python
from pymatgen.ext.matproj import MPRester
from pymatgen.core.composition import Composition
from pymatgen.analysis.phase_diagram import PhaseDiagram, PDPlotter, PDEntry

# Materials ProjectのAPIキーに置き換える
API_KEY = "enter your api key here"

# 組成とエネルギーに置き換える
composition = "Li16CaYb15F63"
energy = 0 # あなたの原子あたりのエネルギー

# Materials Project APIと組成を初期化
mpr = MPRester(API_KEY)
comp = Composition(composition)
elements = list(comp.elements)

# 構成元素を含むすべての化合物をクエリ
entries = mpr.get_entries_in_chemsys([str(el) for el in elements])

# エントリにあなたの構造を追加
your_entry = PDEntry(composition=comp,energy=energy)
entries.append(your_entry)

# 相図を作成
pd = PhaseDiagram(entries)

# 分解とhull上のエネルギーを取得
decomp = pd.get_decomposition(comp)
e_above_hull = pd.get_e_above_hull(your_entry)

i=0
for entry, amount in decomp.items():
    entry.structure.to(filename=poscar_path, fmt="POSCAR"+str(i))
    i+=1
${codeBlock}

### 熱力学的安定性の感覚

#### T = 0 K（DFT）での熱力学的安定性
- ΔG = ΔH（T = 0 Kで）

#### T = 298 Kでの熱力学的安定性
- ΔG = ΔH - TΔS
- 固体ではΔSは無視できる
- ΔG ≈ ΔH
- 一般に、計算結果についてエンタルピーをGibbsエネルギーとして扱う

#### Energy above the hull（E<sub>hull</sub>）
- E<sub>hull</sub> = 0：0 Kで熱力学的に安定
- E<sub>hull</sub> = 500 meV/atom：0 Kで熱力学的に不安定
- E<sub>hull</sub> ≤ 50-100 meV/atom：しばしば「準安定」と呼ばれる

#### 準安定とは何か？
- 準安定：熱力学的に不安定だが実験的にアクセス可能
- 例：高温からのクエンチング、メカノケミカルミリング、薄膜…

### LGPSの例
- 実験的センス（相図）から：LGPSは298から約550 Kで熱力学的に安定
- DFTセンス（E<sub>hull</sub> = 2meV/atom）から：LGPSは0Kで熱力学的に不安定で、Li<sub>4</sub>GeS<sub>4</sub>とLi<sub>3</sub>PS<sub>4</sub>に分解
- 数値誤差がこの判断に影響することに注意
- LGPSはDFTレベルで0Kで熱力学的に不安定
- LGPSは298Kで安定で実験的にアクセス可能
- LGPSは計算から準安定と呼ばれる

### なぜ生成エネルギーがしばしば議論されるのか？
- E<sub>hull</sub> ≈ 相安定性：P = exp(-E<sub>hull</sub>/kT)
- E<sub>f</sub> ≠ 相安定性
- 特に機械学習の目的では、E<sub>f</sub>が採用されている
- E<sub>f</sub>は単元素（金属/ガス）からの反応によって明確に定義されるため
- E<sub>hull</sub>はデータベース内の利用可能な競合相（曖昧！）に依存
- 未知の競合相を見逃す可能性がある

## 背景電荷補償系の実践

### Kröger-Vink記法

M<sub>S</sub><sup>C</sup>：
- Mは元素、ホール（h）、電子（e）、または空孔（V）
- Sはホスト格子内のサイト
- Cは電荷（X：中性、●：正、'：負）

例：Li_svの場合（Liではなく）
- "Li_sv"：3電子（注："Li"ポテンシャルは1電子）
- Li<sup>+</sup>は"Li_sv"で2電子（注：Li<sup>+</sup>の"Li"では0電子）
- Li<sup>+</sup>としてLiを除去する場合、2電子のみを除去（3ではない！）
- F<sup>-</sup>としてFを除去する場合、8電子を除去（7ではない）

## Materials Project計算条件調査

### 計算条件1

- MPのDBにはGGA、GGA+U、meta-GGA r2SCANの計算結果が混在
- r2SCANはGGAに電子のkinetic energyを取り入れたmeta-GGAの一種
- SCANはより正確に反応エネルギーを計算できる一方、数値安定性（計算コストとの兼ね合い？）に課題があった
- r2SCANは数値安定性も向上して、HTスクリーニングに適用され始めている
- とはいえ、計算はまだ重いので、MPではGGA-PBEsolで構造緩和して、次にr2SCANを計算している
- GGA、GGA+U、meta-GGAのエネルギーをconsistentに比較するためのエネルギー補正スキームが一応ある
- r2SCANはカットオフエネルギーは高め（680 eV）
- k-meshはようわからんが、基本MP法
- Pseudo-potentialsはSCAN用のものがないので、PBEのものを流用している
- → MPRelaxでGGA+Uを使用する。r2SCANはまだ手を出さないようにする

### エネルギー補正

- Anion GGA/GGA+U補正とGGA/GGA+U/r2SCAN補正がある
- 現状と過去はanion GGA/GGA+U補正が使われているようだが、今後は後者の補正に変わる
- GGAとGGA+U補正のエネルギー比較にも補正が必要
- GGA/GGA+U補正はAPIでは自動で行われるようだが、本当か？

### 絶対値誤差の原因（系統）

- 0K、0atom vs 1atom？RT → 30meV/atom以下の誤差が生まれるとのこと [S. Lany, Phys. Rev. B 78 2008 1-8]
- 重元素では相対論効果（大きな原子核の正電荷と電子の相互作用）
- ゼロ点エネルギーももちろん誤差に含まれる
- 個別の誤差は大きいが、反応エネルギー的な相対評価では絶対値誤差の中心値は0なので問題なし

### 計算条件2

- 基本的に、スピン分極あり、初期スピン配列はハイスピンの強磁性を採用している
- 以下Inorganic Solid Fluoridesから引用："Strong electronic localization excludes narrow-band or itinerant electron magnetism. As a consequence of lower covalency the magnetic interactions are weaker. At first approximation they often concern only the nearest-neighbor magnetic cations…. High-spin configurations are much more common for fluorides than for oxides due to smaller d-orbital splitting."
- → フッ化物はHigh-spin配列を採用して良さそう
- カットオフエネルギー：520 eV
- k-point mesh：1000/(number of atoms in the cell)
- k-point with MP method but Γ-centered for hexagonal cells
- tetrahedron method for k-point integration
- → このあたりはそのまま使う

### 計算条件3：ハバード（Hubbard）モデル

- 非局在化電子（混成強、バンド幅が広い）は、他の電子との相互作用（電子のポテンシャル場）は平均化された状態
- 局在電子の場合、電子間の相互作用が平均場で記述できない問題。同一原子内の電子の相互作用を指す
- → フッ化物イオンは共有結合性が低く（M-Fの軌道の重なりが小さい）、バンド幅は狭く、電子は局在化の傾向
- 局在電子相関のUを取り入れる必要がある。特に遷移金属化合物の酸化還元電位を計算する場合に重要
- U-valuesはOxidesの生成エネルギーの実験値を元に補正
- Co、Cr、Fe、Mn、Mo、Ni、V、Wで補正済み
- FとOは厳密には別の値が定義されるべきだが、MPではUは酸化物の値で統一している
- Uはpseudo-potential依存。結晶サイトにも依存するが、全サイト同じ値を適用

### 反応電位計算に関する文献

#### D. H. McTaggart et al., Assessing ternary materials for fluoride-ion batteries, Sci. data, 10:90 (2023)
- フッ化物の３元系の反応電位を調査したもの
- MPのGGA/GGA+Uの計算条件に準拠
- 結論の見えないよくわからない論文
- 70meV/atom以下を対象にしている。この値を使うことにする

#### A. Jain et al., Formation enthalpies by mixing GGA and GGA+U calculations, Phys. Rev. B, 84, 045115 (2011)
- 有名なCederグループの報告
- GGAとGGA+Uを比較するための補正提案
- GGA+Uは遷移金属フッ化物（酸化物）で必要だが、遷移金属のメタルではGGA+Uはもはや不要で、GGA計算が必要
- コンバージョン反応系では、金属と金属フッ化物間の反応であるが、それぞれ計算条件（U有り無し）が異なるので、GGAとGGA+Uの比較が困難であった
- この文献では補正式を用いて、LiFeF<sub>3</sub>のリチウムコンバージョン電極の電位がGGA単体より高精度に求まったと述べている
- この考え方はフッ化物電池の電極活物質の計算でも重要になる

### 計算条件4

- MPRelaxでGGA+Uを使用
- U-value：Co: 3.32、Cr: 3.7、Fe: 5.3、Mn: 3.9、Mo: 4.38、Ni: 6.2、V: 3.25、W: 6.2
- ΔE<sub>M</sub>：V: -1.7、Cr: -1.999、Mn: -1.668、Fe: -2.256、Co: -1.638、Ni: -2.541、W: -4.438、Mo: -3.202

### 計算条件5：MaterialsProject2020補正

#### アニオン補正
- 酸化物では結合長によりperoxide、superoxideに分類
- 他のアニオンでは酸化数分類は未適用
- アニオンか否かの判別は酸化数判別か、もっとも電気陰性度の高い元素であるかのいずれか
- → 部分的にフッ素を導入した組成でアニオン判別が切り替わるので、やはりこの補正はかけたくない

## DFT/GNNと汎用ポテンシャルの選択

### 方法の比較（スコア1-5：低-高）あくまで私見・・・

| 方法 | ポテンシャル | 訓練データ | 精度 | 計算コスト | 統計精度 | ポテンシャル互換性の認識 | 難易度 | コメント |
|------|------------|-----------|------|-----------|---------|---------------------|--------|----------|
| DFTMD | - | DFT with on-the-fly learning | 5 | 1 | 1-3 | | | 信頼性は高いが、統計が少ないと導電率計算に実質的な誤差が生じる |
| DFTMD+MLFF | Gauss-kernel | MP trajectory | 3 | 2 | 3-4 | | | DFTより速いが、それほど速くない。EFS予測も良くない |
| GNNMD | m3GNet、SevenNet | OMat with MD | 2 | 3 | 3-1 | | | レガシー。これらの事前訓練モデルは使用しない。MDに対応していない |
| | MACE、eqV2 | Omat | 3.5 | 3 | 4 | 5 | 1 | 最先端の事前訓練モデル。MDに対応！ |
| | Matlantis | Traj., NPT-MD, ... | 4.5| 4 | 4 | 3 | 1 | 使いやすく優れた精度。問題は隠された訓練データ。そのため、能力は常にブラックボックス |
| NNMD Self-trained model | - | NPT-MD, ... | 4.5 | 5 | 5 | 4 | 5 | かなり難しいが最も優れた精度。経験なし |

### 推奨

- 短いステップで正確なシミュレーション：TSUBAMEでDFTMD
- 中程度のステップで正確なシミュレーション：TSUBAMEでDFTMD+MLFF
- 中規模スクリーニング：MATLANTISでMatlantis
- 大規模ラフスクリーニング：TSUBAMEでeqV2OMat
- 大規模精密スクリーニング：TSUBAMEで任意のアーキテクチャを使用して独自のポテンシャルを訓練

## アンサンブルと熱浴の選択

### NPTアンサンブル：粒子数(N)、圧力(P)、温度(T)一定

熱浴：
- VASP：Langevin
- ASE：Nose-Hoover（推奨）

仕様：シミュレーション中に体積と格子形状が可変

使用法：
- 相転移のシミュレーション
- 平衡体積の決定 → NVT計算を引き継ぐことができる
- GNNモデルの訓練データ作成（訓練データには100-200 K高い温度を設定）
- アモルファス構造の作成

### NVTアンサンブル：粒子数(N)、体積(V)、温度(T)一定

熱浴：
- VASP：Langevin、Nose-Hoover（推奨）
- ASE：Langevin、Nose-Hoover（推奨）

仕様：シミュレーション中に体積と格子形状が固定

使用法：
- 0Kで事前最適化された構造またはNPT計算から時間平均された構造からのイオン伝導率のシミュレーション

### 注意事項

- NPTはより柔軟だが、応力の正確な推定が必要
- 一般に、応力のDFT計算には多くの計算コストが必要（ENCUT = ENMAX × 1.3、Pulay応力を参照）
- 事前訓練ポテンシャルを使用する場合、訓練データが高いENCUTで計算されたことに注意
- NVTはイオン伝導率を計算する一般的なアプローチ。固定格子は融点以上でも構造変形や融解を抑制できる
- DFTMDの場合、ENCUT=EMAXを設定することで計算コストを削減できる（通常400 eV）

## 解析

### トレーサー拡散係数
D<sub>tr</sub> = lim<sub>t→∞</sub> Δx<sup>2</sup>/(6t)

- Δx<sup>2</sup>：平均二乗変位
- MSD(Δt)-Δtプロットの傾き = D<sub>tr</sub>

### Nernst-Einstein式
σ = (Z<sub>c</sub><sup>2</sup>e<sup>2</sup>C)/(k<sub>B</sub>T) × D<sub>tr</sub>

C = N<sub>c</sub>/V

Nernst-Einsteinの使用は物議を醸しており、最近議論されている：
A. Marcolongo, N. Marzari, Ionic correlations and failure of Nernst-Einstein relation in solid-state electrolytes, Phys. Rev. Mat., 1, 025402 (2017)

### Arrhenius則
σ = (σ<sub>0</sub>/T) × exp(-E<sub>a</sub>/(kT))

log σT = log σ<sub>0</sub> - 2.303 × E<sub>a</sub>/(kT)

log σT vs 1000/Tの傾き = -2.303 × E<sub>a</sub>/(1000k)

### 上記の特性を計算する方法

1. pymatgen diffusion-analyzerを使用
   - 使いやすい。このモジュールの時間平均化がMSD(Δt)-Δtプロットに人工的な偏差を引き起こすことに注意

2. numpy等で計算（https://github.com/matlantis-pfcc/matlantis-contrib/blob/main/matlantis_contrib_examples/MD_Li_diffusion_in_LGPS）

### 時間平均MSD vs 通常のMSD
- 時間平均MSD(Δt)（式7）は平滑化されたMSDプロファイルを提供するが、Dの誤差を減らさない
- さらに、平滑化はMSD(t)-tプロットの末尾（終端）領域の人工的な偏差を引き起こす
- 通常のMSD(Δt)（式6）は明確さのためにより良い（私の意見では）

### MSD(Δt)-ΔtとArrheniusプロットのフィッティングのヒント
- ✗低温での線形性が悪い：ホッピングイベントが少なく、誤差が大きい
- ◎高温での線形性が良い：ホッピングイベントが多く、統計が良い
- (1) 正確なデータでフィッティング
- (2) 精度の低い低温データを含む全体フィッティング
- 精度が低い→室温で高い伝導率を予測する傾向があるが、これは間違い！！！！！
- 私の意見では、5 Å未満のMSDは破棄すべき
- 10 Åを超えるMSDの使用がより良い

            document.querySelectorAll('.nav-links a').forEach(link => {
                link.classList.remove('active');
                const linkText = link.textContent.toLowerCase().replace(/\s+/g, '');
                if (linkText === page) {
                    link.classList.add('active');
                }
            });

            // コンテンツを表示
            const contentDiv = document.getElementById('content');
            

            if (pageContents[page]) {
                // Markdownをパース
                content.innerHTML = marked.parse(pageContents[page]);
                
                // 重要：すべてのコードブロックにhighlight.jsを適用
                document.querySelectorAll('pre code').forEach((block) => {
                    // 言語を自動検出してハイライト
                    hljs.highlightElement(block);
                });
            } else {
                content.innerHTML = '<h1>ページが見つかりません</h1>';
            }
            if (page === 'study') {
                // Studyページの場合は特別な処理
                contentDiv.innerHTML = marked.parse(pageContents[page]);
                // 初期トピックを表示
                showStudyTopic(0);
                
            } else {
                // 通常のMarkdownコンテンツを表示
                contentDiv.innerHTML = marked.parse(pageContents[page]);
            }
            updateActiveLink(page);
        }

        // Studyトピックを表示する関数
        function showStudyTopic(index) {
            currentStudyTopic = index;
            
            // トピックリストのアクティブ状態を更新
            document.querySelectorAll('#study-topic-list li').forEach((li, i) => {
                if (i === index) {
                    li.classList.add('active');
                } else {
                    li.classList.remove('active');
                }
            });

            // トピックの内容を表示
            const contentDiv = document.getElementById('study-topic-content');
            if (contentDiv && studyTopics[index]) {
                contentDiv.innerHTML = marked.parse(studyTopics[index].content);
            }
        }

        // ページ読み込み時に初期ページを表示
        document.addEventListener('DOMContentLoaded', () => {
            showPage('main');
        });

        // GitHub Pages用のルーティング対応
        function handleHashChange() {
            const hash = window.location.hash.slice(1);
            if (hash && pageContents[hash]) {
                showPage(hash);
            }
        }

        window.addEventListener('hashchange', handleHashChange);

        // 初期読み込み時のハッシュチェック
        if (window.location.hash) {
            handleHashChange();
        }
    </script>
</body>
</html>
